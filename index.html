<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#0c1829">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<title>بهو المدينة — نظام إدارة العقارات</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a1628;--bg2:#0f1d33;--bg3:#162544;--bg4:#1c2f52;
  --gold:#c9a96e;--gold2:#e8c992;--gold3:#a8873f;
  --txt:#e8edf5;--txt2:#8899b4;--txt3:#586580;
  --green:#4ade80;--red:#f87171;--blue:#60a5fa;--orange:#fb923c;--purple:#a78bfa;
  --r:12px;--r2:8px;--sh:0 4px 24px rgba(0,0,0,.3);
}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo',sans-serif}
body{background:var(--bg);color:var(--txt);min-height:100vh;line-height:1.7;overflow-x:hidden}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg2)}::-webkit-scrollbar-thumb{background:var(--gold3);border-radius:3px}
input,select,textarea{background:var(--bg);border:1px solid var(--bg4);color:var(--txt);padding:10px 14px;border-radius:var(--r2);font-family:inherit;font-size:14px;width:100%;transition:.2s}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,169,110,.15)}
label{display:block;font-size:12px;color:var(--txt2);margin-bottom:4px;font-weight:600}
.btn{padding:10px 20px;border:none;border-radius:var(--r2);cursor:pointer;font-family:inherit;font-size:14px;font-weight:700;transition:.2s;display:inline-flex;align-items:center;gap:6px}
.btn:hover{transform:translateY(-1px);filter:brightness(1.1)}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold3));color:#0a1628}
.btn-green{background:var(--green);color:#0a1628}
.btn-red{background:var(--red);color:#fff}
.btn-blue{background:var(--blue);color:#0a1628}
.btn-ghost{background:rgba(255,255,255,.05);color:var(--txt2);border:1px solid var(--bg4)}
.btn-sm{padding:6px 12px;font-size:12px}
.card{background:var(--bg2);border:1px solid var(--bg3);border-radius:var(--r);padding:20px;box-shadow:var(--sh)}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}
.badge-green{background:rgba(74,222,128,.1);color:var(--green)}
.badge-red{background:rgba(248,113,113,.1);color:var(--red)}
.badge-blue{background:rgba(96,165,250,.1);color:var(--blue)}
.badge-gold{background:rgba(201,169,110,.1);color:var(--gold)}
.badge-orange{background:rgba(251,146,60,.1);color:var(--orange)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid3{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.grid4{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
.sec-title{font-size:18px;font-weight:800;color:var(--gold);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.stat-box{background:var(--bg3);border-radius:var(--r2);padding:14px;text-align:center}
.stat-box .val{font-size:20px;font-weight:900;color:var(--gold)}
.stat-box .lbl{font-size:11px;color:var(--txt2);margin-top:2px}
.progress{height:6px;background:var(--bg);border-radius:3px;overflow:hidden;margin-top:6px}
.progress-fill{height:100%;border-radius:3px;transition:width .5s}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)}
.modal-box{background:var(--bg2);border:1px solid var(--bg4);border-radius:var(--r);padding:24px;max-width:500px;width:100%;max-height:85vh;overflow-y:auto}
.tab-bar{display:flex;gap:4px;margin-bottom:20px;overflow-x:auto;padding-bottom:4px}
.tab{padding:8px 16px;border-radius:var(--r2);font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;transition:.2s;border:1px solid transparent;background:rgba(255,255,255,.03);color:var(--txt2)}
.tab.active{background:linear-gradient(135deg,var(--gold),var(--gold3));color:#0a1628;border-color:var(--gold)}
.nav{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--bg3);display:flex;justify-content:space-around;padding:8px 0 max(8px,env(safe-area-inset-bottom));z-index:100}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:2px;font-size:10px;color:var(--txt3);cursor:pointer;padding:4px 8px;transition:.2s}
.nav-item.active{color:var(--gold)}
.nav-item .icon{font-size:20px}
.top-bar{position:sticky;top:0;background:var(--bg2);border-bottom:1px solid var(--bg3);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;z-index:50}
.empty{text-align:center;padding:40px;color:var(--txt3)}
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{background:var(--bg3);color:var(--txt2);padding:10px;text-align:right;font-weight:700}
.tbl td{padding:10px;border-bottom:1px solid var(--bg3)}
.fade-in{animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);padding:12px 24px;border-radius:var(--r2);font-weight:700;z-index:2000;animation:slideDown .3s ease}
@keyframes slideDown{from{opacity:0;transform:translate(-50%,-20px)}to{opacity:1;transform:translate(-50%,0)}}
.sync-indicator{display:flex;align-items:center;gap:6px;font-size:11px;padding:4px 10px;border-radius:20px}
.sync-ok{background:rgba(74,222,128,.1);color:var(--green)}
.sync-pending{background:rgba(251,146,60,.1);color:var(--orange)}
.sync-error{background:rgba(248,113,113,.1);color:var(--red)}
.login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:linear-gradient(135deg,#0a1628 0%,#162544 50%,#0f1d33 100%)}
.login-card{background:var(--bg2);border:1px solid var(--bg3);border-radius:16px;padding:40px;max-width:400px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.login-logo{text-align:center;margin-bottom:30px}
.login-logo h1{font-size:28px;font-weight:900;color:var(--gold);margin-bottom:4px}
.login-logo p{font-size:13px;color:var(--txt2)}
@media(max-width:640px){
  .grid2{grid-template-columns:1fr}
  .modal-box{margin:10px}
  .top-bar{padding:10px 14px}
  body{padding-bottom:70px}
}
.wa-btn{background:#25D366;color:#fff;border:none;padding:6px 12px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:700;font-family:inherit}
.wa-btn:hover{background:#128C7E}
.inst-row{background:var(--bg3);border-radius:var(--r2);padding:12px 16px;margin-bottom:8px;transition:.2s}
.inst-row:hover{background:var(--bg4)}
.inst-paid{border-right:3px solid var(--green)}
.inst-due{border-right:3px solid var(--orange)}
.inst-overdue{border-right:3px solid var(--red)}
.kpi-card{text-align:center;padding:16px;background:var(--bg3);border-radius:var(--r);transition:.2s}
.kpi-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.kpi-val{font-size:24px;font-weight:900}
.kpi-lbl{font-size:11px;color:var(--txt2);margin-top:4px}
</style>
</head>
<body>
<div id="app"></div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
// ============================================================
// FIREBASE CONFIG — استبدل هذه البيانات ببيانات مشروعك
// ============================================================
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyAVJIu9mpkvd5oi0lx8ey1n5PQEf7s6fGo",
  authDomain: "bahoalmadina.firebaseapp.com",
  projectId: "bahoalmadina",
  storageBucket: "bahoalmadina.firebasestorage.app",
  messagingSenderId: "1036445804903",
  appId: "1:1036445804903:web:9c4f47bc94c62477fb27c2"
};

// ============================================================
// INITIALIZE FIREBASE
// ============================================================
let db = null, auth = null, firebaseReady = false;
try {
  if (FIREBASE_CONFIG.apiKey !== "YOUR_API_KEY") {
    firebase.initializeApp(FIREBASE_CONFIG);
    auth = firebase.auth();
    db = firebase.firestore();
    db.enablePersistence({ synchronizeTabs: true }).catch(()=>{});
    firebaseReady = true;
  }
} catch(e) { console.warn("Firebase not configured, using localStorage:", e); }

// ============================================================
// STORAGE LAYER — يعمل مع Firebase أو localStorage
// ============================================================
const Storage = {
  async load(userId) {
    if (firebaseReady && userId) {
      try {
        const doc = await db.collection("tenants_data").doc(userId).get();
        if (doc.exists) return doc.data();
      } catch(e) { console.error("Firestore load error:", e); }
    }
    const local = localStorage.getItem("baho-rental-data");
    return local ? JSON.parse(local) : null;
  },
  async save(userId, data) {
    localStorage.setItem("baho-rental-data", JSON.stringify(data));
    if (firebaseReady && userId) {
      try {
        await db.collection("tenants_data").doc(userId).set(data, { merge: true });
        return "cloud";
      } catch(e) { console.error("Firestore save error:", e); return "local"; }
    }
    return "local";
  }
};

// ============================================================
// UTILITY FUNCTIONS
// ============================================================
const fmt = n => (n||0).toLocaleString("ar-SA");
const sar = n => `${fmt(n)} ر.س`;
const pct = n => `${Math.round((n||0)*100)}%`;
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,7);
const today = () => new Date().toISOString().split("T")[0];
const daysDiff = d => { try { return Math.round((new Date(d)-new Date())/864e5); } catch{ return 0; } };
const instPaid = i => (i.payments||[]).reduce((s,p)=>s+(p.amount||0),0);
const instRemaining = i => Math.max(0, (i.amount||0) - instPaid(i));
const instIsFull = i => instRemaining(i) <= 0;

function genDueDates(start, count) {
  if (!count || !start) return [];
  const s = new Date(start), iv = Math.round(12/count), r = [];
  for (let i=0; i<count; i++) { const d = new Date(s); d.setMonth(d.getMonth()+iv*i); r.push(d.toISOString().split("T")[0]); }
  return r;
}

function buildWAMsg(tenant, unit, prop, amount, remaining, dueDate, num, isOverdue, days) {
  const lines = [
    "السلام عليكم ورحمة الله وبركاته",
    "", `المستأجر الكريم: ${tenant}`, `الوحدة: ${unit} — ${prop}`, "",
    isOverdue
      ? `نود تذكيركم بأن الدفعة رقم (${num}) بمبلغ ${sar(amount)} استحقت بتاريخ ${dueDate} وتأخرت ${days} يوم.`
      : `نود تذكيركم بأن الدفعة رقم (${num}) بمبلغ ${sar(remaining)} مستحقة بتاريخ ${dueDate}.`,
    "", "نأمل السداد في أقرب وقت.", "", "مع خالص التحية،", "بهو المدينة العقارية"
  ];
  return lines.join("\n");
}

// ============================================================
// DEFAULT DATA
// ============================================================
const DEFAULT_DATA = {
  owners: [{ id:"o1", name:"بهو المدينة", phone:"", notes:"بهو المدينة للتأسيس والتشغيل العقاري" }],
  properties: [{ id:"p1", ownerId:"o1", name:"عمارة الممشى", location:"المدينة المنورة", type:"سكني" }],
  units: [
    { id:"u1", propId:"p1", name:"شقة 1", contractNo:"10135318068", tenant:"يوسف الفيروز شركة", status:"مستأجرة", startDate:"2026-01-01", endDate:"2026-12-30", payMethod:"منصة ايجار", value:22000, installments:1, phone:"509355566" },
    { id:"u2", propId:"p1", name:"شقة 2", contractNo:"10065470490", tenant:"أسامة النهاري", status:"مستأجرة", startDate:"2026-01-01", endDate:"2026-12-30", payMethod:"منصة ايجار", value:20000, installments:2, phone:"" },
  ],
  payments: [],
  expenses: [],
  maintenance: [],
  brokers: [],
  projects: [],
  auditLog: [],
  lastSync: null
};

// ============================================================
// MAIN APPLICATION
// ============================================================
class App {
  constructor() {
    this.state = {
      page: "login", // login, dashboard, owners, property, unit, maintenance, analytics, brokers, projects, alerts, audit
      user: null,
      data: null,
      syncStatus: "pending",
      selectedOwner: null,
      selectedProp: null,
      selectedUnit: null,
      modal: null,
      form: {},
      toast: null,
      tab: "overview",
      loading: true
    };
    this.el = document.getElementById("app");
    this.checkAuth();
  }

  setState(updates) {
    Object.assign(this.state, updates);
    this.render();
  }

  checkAuth() {
    if (firebaseReady) {
      auth.onAuthStateChanged(user => {
        if (user) {
          this.setState({ user: { uid: user.uid, email: user.email, name: user.displayName || user.email.split("@")[0] }, loading: false });
          this.loadData(user.uid);
        } else {
          this.setState({ page: "login", user: null, loading: false });
        }
      });
    } else {
      // Local mode
      const savedUser = localStorage.getItem("baho-user");
      if (savedUser) {
        const u = JSON.parse(savedUser);
        this.setState({ user: u, loading: false });
        this.loadData(u.uid);
      } else {
        this.setState({ page: "login", loading: false });
      }
    }
  }

  async loadData(userId) {
    const data = await Storage.load(userId);
    this.setState({
      data: data || JSON.parse(JSON.stringify(DEFAULT_DATA)),
      page: "dashboard",
      syncStatus: firebaseReady ? "ok" : "local"
    });
  }

  async saveData() {
    if (!this.state.data || !this.state.user) return;
    this.state.data.lastSync = new Date().toISOString();
    const status = await Storage.save(this.state.user.uid, this.state.data);
    this.setState({ syncStatus: status === "cloud" ? "ok" : "local" });
  }

  addAudit(action, details) {
    if (!this.state.data) return;
    this.state.data.auditLog.unshift({
      id: uid(), date: new Date().toISOString(), user: this.state.user?.name || "مجهول",
      action, details
    });
    if (this.state.data.auditLog.length > 500) this.state.data.auditLog.length = 500;
  }

  showToast(msg, type="success") {
    this.setState({ toast: { msg, type } });
    setTimeout(() => this.setState({ toast: null }), 2500);
  }

  // AUTH METHODS
  async login(email, password) {
    if (!email || !password) { this.showLoginError("أدخل البريد الإلكتروني وكلمة المرور"); return; }
    if (password.length < 6) { this.showLoginError("كلمة المرور يجب أن تكون 6 أحرف على الأقل"); return; }
    
    this.showLoginError(""); // clear previous
    const btn = document.getElementById("login-btn");
    if (btn) { btn.disabled = true; btn.textContent = "⏳ جارِ الدخول..."; }

    if (firebaseReady) {
      try {
        await auth.signInWithEmailAndPassword(email, password);
      } catch(e) {
        console.log("Login error:", e.code, e.message);
        // If user not found or invalid credential, try creating account
        if (e.code === "auth/user-not-found" || e.code === "auth/invalid-credential" || e.code === "auth/wrong-password") {
          try {
            await auth.createUserWithEmailAndPassword(email, password);
          } catch(e2) {
            console.log("Signup error:", e2.code, e2.message);
            const msg = this.firebaseErrorAr(e2.code);
            this.showLoginError(msg);
            if (btn) { btn.disabled = false; btn.textContent = "🔐 تسجيل الدخول"; }
          }
        } else {
          const msg = this.firebaseErrorAr(e.code);
          this.showLoginError(msg);
          if (btn) { btn.disabled = false; btn.textContent = "🔐 تسجيل الدخول"; }
        }
      }
    } else {
      // Local mode login
      const u = { uid: email.replace(/[^a-z0-9]/gi,"_"), email, name: email.split("@")[0] };
      localStorage.setItem("baho-user", JSON.stringify(u));
      this.setState({ user: u });
      this.loadData(u.uid);
    }
  }

  firebaseErrorAr(code) {
    const map = {
      "auth/invalid-email": "البريد الإلكتروني غير صحيح",
      "auth/user-disabled": "هذا الحساب معطّل",
      "auth/user-not-found": "لا يوجد حساب بهذا البريد — جارِ إنشاء حساب جديد",
      "auth/wrong-password": "كلمة المرور غير صحيحة",
      "auth/invalid-credential": "البيانات غير صحيحة — تأكد من البريد وكلمة المرور",
      "auth/email-already-in-use": "هذا البريد مسجّل مسبقاً — جرّب تسجيل الدخول",
      "auth/weak-password": "كلمة المرور ضعيفة — استخدم 6 أحرف على الأقل",
      "auth/network-request-failed": "خطأ في الاتصال — تحقق من الإنترنت",
      "auth/too-many-requests": "محاولات كثيرة — انتظر دقيقة وحاول مرة أخرى",
      "auth/operation-not-allowed": "⚠ تسجيل الدخول بالبريد غير مفعّل في Firebase — فعّل Email/Password في Authentication",
      "auth/unauthorized-domain": "⚠ النطاق غير مسموح — أضف hugailyf.github.io في Firebase → Authentication → Settings → Authorized domains",
      "auth/configuration-not-found": "⚠ خدمة Authentication غير مفعّلة — فعّلها من Firebase Console"
    };
    return map[code] || "خطأ: " + code;
  }

  showLoginError(msg) {
    const el = document.getElementById("login-error");
    if (el) {
      el.textContent = msg;
      el.style.display = msg ? "block" : "none";
    }
  }

  async logout() {
    if (firebaseReady) { await auth.signOut(); }
    localStorage.removeItem("baho-user");
    this.setState({ page: "login", user: null, data: null });
  }

  // DATA HELPERS
  get owners() { return this.state.data?.owners || []; }
  get properties() { return this.state.data?.properties || []; }
  get units() { return this.state.data?.units || []; }
  get expenses() { return this.state.data?.expenses || []; }
  get maintenance() { return this.state.data?.maintenance || []; }
  get brokers() { return this.state.data?.brokers || []; }
  get projects() { return this.state.data?.projects || []; }

  propsByOwner(ownerId) { return this.properties.filter(p => p.ownerId === ownerId); }
  unitsByProp(propId) { return this.units.filter(u => u.propId === propId); }
  expensesByProp(propId) { return this.expenses.filter(e => e.propId === propId); }
  expensesByUnit(unitId) { return this.expenses.filter(e => e.unitId === unitId); }

  unitPayments(unit) {
    if (!unit) return [];
    const existing = (this.state.data?.payments || []).filter(p => p.unitId === unit.id);
    if (existing.length > 0) return existing;
    // Generate from contract
    const dates = genDueDates(unit.startDate, unit.installments || 1);
    const amt = Math.round((unit.value || 0) / (unit.installments || 1));
    return dates.map((d, i) => ({
      id: `${unit.id}_p${i}`, unitId: unit.id, num: i+1,
      dueDate: d, amount: amt, payments: [], notes: ""
    }));
  }

  // COMPUTED STATS
  totalRevenue() {
    return this.units.reduce((s, u) => {
      return s + this.unitPayments(u).reduce((s2, p) => s2 + instPaid(p), 0);
    }, 0);
  }

  totalExpenses() {
    return this.expenses.reduce((s, e) => s + (e.amount || 0), 0);
  }

  occupancyRate() {
    const total = this.units.length;
    if (!total) return 0;
    return this.units.filter(u => u.status === "مستأجرة").length / total;
  }

  collectionRate() {
    let due = 0, paid = 0;
    this.units.forEach(u => {
      this.unitPayments(u).forEach(p => {
        due += p.amount || 0;
        paid += instPaid(p);
      });
    });
    return due > 0 ? paid / due : 0;
  }

  overduePayments() {
    const result = [];
    this.units.forEach(u => {
      const prop = this.properties.find(p => p.id === u.propId);
      this.unitPayments(u).forEach(p => {
        if (!instIsFull(p) && daysDiff(p.dueDate) < 0) {
          result.push({ ...p, unit: u, prop, overdueDays: Math.abs(daysDiff(p.dueDate)) });
        }
      });
    });
    return result.sort((a,b) => b.overdueDays - a.overdueDays);
  }

  upcomingPayments(days=30) {
    const result = [];
    this.units.forEach(u => {
      const prop = this.properties.find(p => p.id === u.propId);
      this.unitPayments(u).forEach(p => {
        const d = daysDiff(p.dueDate);
        if (!instIsFull(p) && d >= 0 && d <= days) {
          result.push({ ...p, unit: u, prop, daysLeft: d });
        }
      });
    });
    return result.sort((a,b) => a.daysLeft - b.daysLeft);
  }

  // ============================================================
  // RENDER
  // ============================================================
  render() {
    const s = this.state;
    if (s.loading) {
      this.el.innerHTML = `<div class="login-page"><div style="text-align:center"><div style="font-size:48px;margin-bottom:16px">🏢</div><div style="color:var(--gold);font-size:18px;font-weight:700">جارِ التحميل...</div></div></div>`;
      return;
    }

    let html = "";

    // Toast
    if (s.toast) {
      const bg = s.toast.type === "error" ? "var(--red)" : s.toast.type === "warning" ? "var(--orange)" : "var(--green)";
      html += `<div class="toast" style="background:${bg};color:#fff">${s.toast.msg}</div>`;
    }

    // Pages
    if (s.page === "login") {
      html += this.renderLogin();
    } else {
      html += this.renderTopBar();
      html += `<div style="padding:16px 20px;padding-bottom:80px" class="fade-in">`;
      switch(s.page) {
        case "dashboard": html += this.renderDashboard(); break;
        case "owners": html += this.renderOwners(); break;
        case "property": html += this.renderProperty(); break;
        case "unit": html += this.renderUnit(); break;
        case "maintenance": html += this.renderMaintenance(); break;
        case "analytics": html += this.renderAnalytics(); break;
        case "brokers": html += this.renderBrokers(); break;
        case "projects": html += this.renderProjects(); break;
        case "alerts": html += this.renderAlerts(); break;
        case "audit": html += this.renderAudit(); break;
      }
      html += `</div>`;
      if (s.modal) html += this.renderModal();
      html += this.renderNav();
    }

    this.el.innerHTML = html;
    this.attachEvents();
  }

  // ============================================================
  // LOGIN PAGE
  // ============================================================
  renderLogin() {
    return `
    <div class="login-page">
      <div class="login-card">
        <div class="login-logo">
          <div style="font-size:56px;margin-bottom:12px">🏢</div>
          <h1>بهو المدينة العقارية</h1>
          <p>نظام إدارة العقارات السحابي</p>
        </div>
        <div style="margin-bottom:16px">
          <label>البريد الإلكتروني</label>
          <input type="email" id="login-email" placeholder="example@email.com" dir="ltr" style="text-align:left">
        </div>
        <div style="margin-bottom:24px">
          <label>كلمة المرور</label>
          <input type="password" id="login-pass" placeholder="••••••••" dir="ltr">
        </div>
        <button class="btn btn-gold" style="width:100%;justify-content:center;padding:14px;font-size:16px" id="login-btn">
          🔐 تسجيل الدخول
        </button>
        <div id="login-error" style="display:none;margin-top:12px;padding:12px;background:rgba(248,113,113,.15);border:1px solid rgba(248,113,113,.3);border-radius:8px;color:var(--red);font-size:13px;text-align:center;font-weight:600;line-height:1.6"></div>
        <p style="text-align:center;margin-top:16px;font-size:12px;color:var(--txt3)">
          ${firebaseReady ? "إذا لم يكن لديك حساب سيتم إنشاؤه تلقائياً" : "⚡ وضع محلي — لتفعيل السحابي أعد إعداد Firebase"}
        </p>
        <div style="margin-top:20px;padding-top:16px;border-top:1px solid var(--bg4);text-align:center">
          <div class="badge badge-gold">الإصدار 5.0 — سحابي</div>
        </div>
      </div>
    </div>`;
  }

  // ============================================================
  // TOP BAR
  // ============================================================
  renderTopBar() {
    const s = this.state;
    const syncClass = s.syncStatus === "ok" ? "sync-ok" : s.syncStatus === "local" ? "sync-pending" : "sync-error";
    const syncLabel = s.syncStatus === "ok" ? "☁️ متصل" : s.syncStatus === "local" ? "💾 محلي" : "⚠ خطأ";
    
    let title = "لوحة التحكم";
    if (s.page === "owners") title = "الملاك";
    else if (s.page === "property") title = this.properties.find(p=>p.id===s.selectedProp)?.name || "العقار";
    else if (s.page === "unit") title = this.units.find(u=>u.id===s.selectedUnit)?.name || "الوحدة";
    else if (s.page === "maintenance") title = "الصيانة";
    else if (s.page === "analytics") title = "التحليلات";
    else if (s.page === "brokers") title = "الوسطاء";
    else if (s.page === "projects") title = "المشاريع";
    else if (s.page === "alerts") title = "التنبيهات";
    else if (s.page === "audit") title = "سجل العمليات";

    const showBack = s.page !== "dashboard";

    return `
    <div class="top-bar">
      <div style="display:flex;align-items:center;gap:10px">
        ${showBack ? `<span style="cursor:pointer;font-size:18px" id="back-btn">→</span>` : ""}
        <span style="font-weight:800;font-size:16px">${title}</span>
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        <div class="sync-indicator ${syncClass}">${syncLabel}</div>
        <span style="cursor:pointer;font-size:18px" id="save-btn" title="حفظ">💾</span>
        <span style="cursor:pointer;font-size:18px" id="logout-btn" title="خروج">🚪</span>
      </div>
    </div>`;
  }

  // ============================================================
  // NAVIGATION
  // ============================================================
  renderNav() {
    const items = [
      { id:"dashboard", icon:"🏠", label:"الرئيسية" },
      { id:"owners", icon:"👤", label:"الملاك" },
      { id:"alerts", icon:"🔔", label:"التنبيهات" },
      { id:"analytics", icon:"📊", label:"التحليلات" },
      { id:"more", icon:"☰", label:"المزيد" }
    ];
    return `<div class="nav">${items.map(i => `
      <div class="nav-item ${this.state.page === i.id ? 'active' : ''}" data-nav="${i.id}">
        <span class="icon">${i.icon}</span>${i.label}
      </div>
    `).join("")}</div>`;
  }

  // ============================================================
  // DASHBOARD
  // ============================================================
  renderDashboard() {
    const overdue = this.overduePayments();
    const upcoming = this.upcomingPayments(7);
    const rev = this.totalRevenue();
    const exp = this.totalExpenses();
    
    return `
    <div style="margin-bottom:20px;text-align:center">
      <div style="font-size:14px;color:var(--txt2)">مرحباً ${this.state.user?.name || ""}</div>
    </div>

    ${overdue.length > 0 ? `
    <div class="card" style="margin-bottom:16px;border-color:var(--red);border-width:2px">
      <div style="color:var(--red);font-weight:800;margin-bottom:8px">⚠ ${overdue.length} دفعة متأخرة</div>
      ${overdue.slice(0,3).map(p => `
        <div style="display:flex;justify-content:space-between;padding:6px 0;font-size:13px">
          <span>${p.unit.tenant} — ${p.unit.name}</span>
          <span style="color:var(--red)">${sar(instRemaining(p))} • متأخر ${p.overdueDays} يوم</span>
        </div>
      `).join("")}
    </div>` : ""}

    <div class="grid4" style="margin-bottom:20px">
      <div class="stat-box"><div class="val">${fmt(this.properties.length)}</div><div class="lbl">عقار</div></div>
      <div class="stat-box"><div class="val">${fmt(this.units.length)}</div><div class="lbl">وحدة</div></div>
      <div class="stat-box"><div class="val" style="color:var(--green)">${pct(this.occupancyRate())}</div><div class="lbl">نسبة الإشغال</div></div>
      <div class="stat-box"><div class="val" style="color:var(--blue)">${pct(this.collectionRate())}</div><div class="lbl">نسبة التحصيل</div></div>
    </div>

    <div class="grid2" style="margin-bottom:20px">
      <div class="stat-box"><div class="val" style="color:var(--green)">${sar(rev)}</div><div class="lbl">إجمالي المحصّل</div></div>
      <div class="stat-box"><div class="val" style="color:var(--orange)">${sar(exp)}</div><div class="lbl">إجمالي المصروفات</div></div>
    </div>

    <div class="sec-title">🏢 العقارات</div>
    <div style="margin-bottom:12px">
      <button class="btn btn-gold btn-sm" id="add-prop-btn">+ عقار جديد</button>
    </div>
    ${this.properties.map(p => {
      const units = this.unitsByProp(p.id);
      const occupied = units.filter(u => u.status === "مستأجرة").length;
      const totalRev = units.reduce((s,u) => s + (u.value||0), 0);
      const owner = this.owners.find(o => o.id === p.ownerId);
      return `
      <div class="card" style="margin-bottom:12px;cursor:pointer" data-goto-prop="${p.id}">
        <div style="display:flex;justify-content:space-between;align-items:start">
          <div>
            <div style="font-weight:800;font-size:16px;color:var(--gold)">${p.name}</div>
            <div style="font-size:12px;color:var(--txt2)">${p.location || ""} ${owner ? `• ${owner.name}` : ""}</div>
          </div>
          <div class="badge badge-blue">${p.type || "سكني"}</div>
        </div>
        <div class="grid4" style="margin-top:12px">
          <div class="stat-box"><div class="val" style="font-size:16px">${units.length}</div><div class="lbl">وحدة</div></div>
          <div class="stat-box"><div class="val" style="font-size:16px;color:var(--green)">${occupied}</div><div class="lbl">مؤجرة</div></div>
          <div class="stat-box"><div class="val" style="font-size:14px;color:var(--gold)">${sar(totalRev)}</div><div class="lbl">إيجار سنوي</div></div>
        </div>
      </div>`;
    }).join("")}

    ${this.properties.length === 0 ? `<div class="empty">لا توجد عقارات بعد — أضف أول عقار</div>` : ""}

    <div style="margin-top:24px">
      <div class="sec-title">⚡ اختصارات</div>
      <div class="grid2">
        <button class="btn btn-ghost" style="justify-content:center" data-nav="maintenance">🔧 الصيانة</button>
        <button class="btn btn-ghost" style="justify-content:center" data-nav="brokers">👥 الوسطاء</button>
        <button class="btn btn-ghost" style="justify-content:center" data-nav="projects">🏗️ المشاريع</button>
        <button class="btn btn-ghost" style="justify-content:center" data-nav="audit">📋 سجل العمليات</button>
      </div>
    </div>

    <div style="margin-top:20px">
      <div class="sec-title">💾 النسخ الاحتياطي</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn btn-ghost btn-sm" id="export-btn">📥 تصدير JSON</button>
        <label class="btn btn-ghost btn-sm" style="cursor:pointer">📤 استيراد JSON<input type="file" accept=".json" id="import-input" style="display:none"></label>
      </div>
    </div>`;
  }

  // ============================================================
  // PROPERTY VIEW
  // ============================================================
  renderProperty() {
    const p = this.properties.find(x => x.id === this.state.selectedProp);
    if (!p) return `<div class="empty">لم يتم العثور على العقار</div>`;
    const units = this.unitsByProp(p.id);
    const exps = this.expensesByProp(p.id);
    const totalRent = units.reduce((s,u)=>s+(u.value||0),0);
    const totalExp = exps.reduce((s,e)=>s+(e.amount||0),0);
    const occupied = units.filter(u=>u.status==="مستأجرة").length;

    return `
    <div class="card" style="margin-bottom:16px">
      <div style="display:flex;justify-content:space-between;margin-bottom:12px">
        <div><div style="font-size:20px;font-weight:900;color:var(--gold)">${p.name}</div><div style="font-size:13px;color:var(--txt2)">${p.location || ""}</div></div>
        <div style="display:flex;gap:6px">
          <button class="btn btn-ghost btn-sm" data-edit-prop="${p.id}">✏️</button>
          <button class="btn btn-red btn-sm" data-del-prop="${p.id}">🗑</button>
        </div>
      </div>
      <div class="grid4">
        <div class="stat-box"><div class="val" style="font-size:16px">${units.length}</div><div class="lbl">وحدة</div></div>
        <div class="stat-box"><div class="val" style="font-size:16px;color:var(--green)">${occupied}/${units.length}</div><div class="lbl">مؤجرة</div></div>
        <div class="stat-box"><div class="val" style="font-size:14px;color:var(--gold)">${sar(totalRent)}</div><div class="lbl">إيجار سنوي</div></div>
        <div class="stat-box"><div class="val" style="font-size:14px;color:var(--green)">${sar(totalRent - totalExp)}</div><div class="lbl">صافي</div></div>
      </div>
    </div>

    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <div class="sec-title" style="margin:0">🏠 الوحدات</div>
      <button class="btn btn-gold btn-sm" data-add-unit="${p.id}">+ وحدة</button>
    </div>

    ${units.map(u => {
      const pays = this.unitPayments(u);
      const paid = pays.reduce((s,p) => s + instPaid(p), 0);
      const due = pays.reduce((s,p) => s + (p.amount||0), 0);
      const ratio = due > 0 ? paid/due : 0;
      const isOverdue = pays.some(p => !instIsFull(p) && daysDiff(p.dueDate) < 0);
      return `
      <div class="card" style="margin-bottom:10px;cursor:pointer;${isOverdue?'border-color:var(--red)':''}" data-goto-unit="${u.id}">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div>
            <span style="font-weight:800">${u.name}</span>
            <span style="font-size:12px;color:var(--txt2);margin-right:8px">${u.tenant || "شاغرة"}</span>
          </div>
          <span class="badge ${u.status==='مستأجرة'?'badge-green':u.status==='شاغرة'?'badge-red':'badge-orange'}">${u.status}</span>
        </div>
        <div style="display:flex;justify-content:space-between;margin-top:8px;font-size:13px;color:var(--txt2)">
          <span>الإيجار: ${sar(u.value)}</span>
          <span>المحصّل: <span style="color:var(--green)">${sar(paid)}</span></span>
        </div>
        <div class="progress"><div class="progress-fill" style="width:${ratio*100}%;background:${ratio>=1?'var(--green)':ratio>.5?'var(--blue)':'var(--orange)'}"></div></div>
        ${isOverdue ? `<div style="color:var(--red);font-size:11px;margin-top:4px">⚠ يوجد دفعات متأخرة</div>` : ""}
      </div>`;
    }).join("")}

    ${units.length === 0 ? `<div class="empty">لا توجد وحدات — أضف أول وحدة</div>` : ""}

    <div style="margin-top:20px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <div class="sec-title" style="margin:0">💰 المصروفات</div>
        <button class="btn btn-ghost btn-sm" data-add-exp="${p.id}">+ مصروف</button>
      </div>
      ${exps.length > 0 ? `
      <table class="tbl">
        <tr><th>التاريخ</th><th>النوع</th><th>المبلغ</th><th>ملاحظات</th></tr>
        ${exps.slice(0,10).map(e => `<tr><td>${e.date||""}</td><td>${e.type||""}</td><td>${sar(e.amount)}</td><td style="font-size:12px">${e.notes||""}</td></tr>`).join("")}
      </table>` : `<div class="empty" style="padding:20px">لا توجد مصروفات</div>`}
    </div>`;
  }

  // ============================================================
  // UNIT VIEW
  // ============================================================
  renderUnit() {
    const u = this.units.find(x => x.id === this.state.selectedUnit);
    if (!u) return `<div class="empty">لم يتم العثور على الوحدة</div>`;
    const prop = this.properties.find(p => p.id === u.propId);
    const pays = this.unitPayments(u);
    const totalPaid = pays.reduce((s,p) => s + instPaid(p), 0);
    const totalDue = pays.reduce((s,p) => s + (p.amount||0), 0);
    const remaining = totalDue - totalPaid;
    const exps = this.expensesByUnit(u.id);
    const totalExp = exps.reduce((s,e) => s + (e.amount||0), 0);

    return `
    <div class="card" style="margin-bottom:16px">
      <div style="display:flex;justify-content:space-between;margin-bottom:12px">
        <div>
          <div style="font-size:20px;font-weight:900;color:var(--gold)">${u.name}</div>
          <div style="font-size:13px;color:var(--txt2)">${prop?.name || ""} • ${u.tenant || "شاغرة"}</div>
        </div>
        <div style="display:flex;gap:6px">
          <button class="btn btn-ghost btn-sm" data-edit-unit="${u.id}">✏️</button>
          <button class="btn btn-red btn-sm" data-del-unit="${u.id}">🗑</button>
        </div>
      </div>
      <div class="grid4">
        <div class="stat-box"><div class="val" style="font-size:14px;color:var(--gold)">${sar(u.value)}</div><div class="lbl">الإيجار</div></div>
        <div class="stat-box"><div class="val" style="font-size:14px;color:var(--green)">${sar(totalPaid)}</div><div class="lbl">المحصّل</div></div>
        <div class="stat-box"><div class="val" style="font-size:14px;color:${remaining>0?'var(--red)':'var(--green)'}">${sar(remaining)}</div><div class="lbl">المتبقي</div></div>
        <div class="stat-box"><div class="val" style="font-size:14px;color:var(--green)">${sar(u.value - totalExp)}</div><div class="lbl">الصافي</div></div>
      </div>
      <div style="margin-top:10px;font-size:12px;color:var(--txt2)">
        العقد: ${u.contractNo || "—"} • من ${u.startDate||"—"} إلى ${u.endDate||"—"} • ${u.payMethod || "—"}
      </div>
    </div>

    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <div class="sec-title" style="margin:0">💳 الدفعات</div>
      <div style="display:flex;gap:6px">
        <label class="btn btn-blue btn-sm" style="cursor:pointer">
          📥 استيراد من إيجار
          <input type="file" accept=".xlsx,.xls,.csv" data-import-payments="${u.id}" style="display:none">
        </label>
        <button class="btn btn-gold btn-sm" data-add-installment="${u.id}">+ دفعة</button>
      </div>
    </div>
    <div id="import-status-${u.id}" style="display:none;margin-bottom:12px;padding:12px;border-radius:8px;font-size:12px;line-height:1.6"></div>

    ${pays.map(p => {
      const pd = instPaid(p);
      const rm = instRemaining(p);
      const full = rm <= 0;
      const isOverdue = !full && daysDiff(p.dueDate) < 0;
      const overdueDays = isOverdue ? Math.abs(daysDiff(p.dueDate)) : 0;
      const cls = full ? "inst-paid" : isOverdue ? "inst-overdue" : "inst-due";
      const waM = buildWAMsg(u.tenant, u.name, prop?.name||"", p.amount, rm, p.dueDate, p.num, isOverdue, overdueDays);
      const waLink = u.phone ? `https://wa.me/${u.phone.startsWith("966")?u.phone:u.phone.startsWith("05")?"966"+u.phone.slice(1):"966"+u.phone}?text=${encodeURIComponent(waM)}` : "";

      return `
      <div class="inst-row ${cls}">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div>
            <span style="font-weight:800;${full?'color:var(--green)':isOverdue?'color:var(--red)':''}">#${p.num||""}</span>
            <span style="font-size:13px;margin-right:8px">${sar(p.amount)}</span>
            <span style="font-size:11px;color:var(--txt3)">• ${p.dueDate || ""}</span>
          </div>
          <div style="display:flex;gap:6px;align-items:center">
            ${full ? `<span class="badge badge-green">✓ مسدد</span>` :
              isOverdue ? `<span class="badge badge-red">متأخر ${overdueDays} يوم</span>` :
              `<span class="badge badge-orange">مستحق</span>`}
          </div>
        </div>
        ${pd > 0 && !full ? `<div style="font-size:12px;color:var(--txt2);margin-top:4px">المدفوع: ${sar(pd)} • المتبقي: <span style="color:var(--red)">${sar(rm)}</span></div>` : ""}
        ${!full ? `
        <div style="display:flex;gap:6px;margin-top:8px">
          <button class="btn btn-green btn-sm" data-pay-inst="${p.id}" data-unit="${u.id}">💰 تسجيل دفع</button>
          ${waLink ? `<a href="${waLink}" target="_blank" class="wa-btn">📱 واتساب</a>` : ""}
        </div>` : ""}
      </div>`;
    }).join("")}

    ${pays.length === 0 ? `<div class="empty" style="padding:20px">لا توجد دفعات</div>` : ""}`;
  }

  // ============================================================
  // ALERTS PAGE
  // ============================================================
  renderAlerts() {
    const overdue = this.overduePayments();
    const upcoming = this.upcomingPayments(30);

    return `
    <div class="sec-title">⚠ الدفعات المتأخرة (${overdue.length})</div>
    ${overdue.length > 0 ? overdue.map(p => `
      <div class="card" style="margin-bottom:8px;border-right:3px solid var(--red)">
        <div style="display:flex;justify-content:space-between">
          <div><strong>${p.unit.tenant}</strong> — ${p.unit.name} (${p.prop?.name||""})</div>
          <span class="badge badge-red">متأخر ${p.overdueDays} يوم</span>
        </div>
        <div style="font-size:13px;color:var(--txt2);margin-top:4px">المبلغ: ${sar(p.amount)} • المتبقي: ${sar(instRemaining(p))} • الاستحقاق: ${p.dueDate}</div>
      </div>
    `).join("") : `<div class="empty" style="padding:20px">لا توجد دفعات متأخرة ✓</div>`}

    <div class="sec-title" style="margin-top:24px">📅 مستحقة خلال 30 يوم (${upcoming.length})</div>
    ${upcoming.length > 0 ? upcoming.map(p => `
      <div class="card" style="margin-bottom:8px;border-right:3px solid var(--orange)">
        <div style="display:flex;justify-content:space-between">
          <div><strong>${p.unit.tenant}</strong> — ${p.unit.name}</div>
          <span class="badge badge-orange">بعد ${p.daysLeft} يوم</span>
        </div>
        <div style="font-size:13px;color:var(--txt2);margin-top:4px">${sar(instRemaining(p))} • ${p.dueDate}</div>
      </div>
    `).join("") : `<div class="empty" style="padding:20px">لا توجد دفعات مستحقة قريبة</div>`}

    <div style="margin-top:24px">
      <div class="sec-title">📊 ملخص التنبيهات</div>
      <div class="grid2">
        <div class="stat-box" style="border-right:3px solid var(--red)"><div class="val" style="color:var(--red)">${overdue.length}</div><div class="lbl">دفعة متأخرة</div></div>
        <div class="stat-box" style="border-right:3px solid var(--orange)"><div class="val" style="color:var(--orange)">${upcoming.length}</div><div class="lbl">مستحقة قريباً</div></div>

  // ============================================================
  // ANALYTICS PAGE
  // ============================================================
  renderAnalytics() {
    const rev = this.totalRevenue();
    const exp = this.totalExpenses();
    const net = rev - exp;
    const occ = this.occupancyRate();
    const coll = this.collectionRate();
    const totalRent = this.units.reduce((s,u) => s + (u.value||0), 0);

    // Per property comparison
    const propStats = this.properties.map(p => {
      const units = this.unitsByProp(p.id);
      const rent = units.reduce((s,u) => s + (u.value||0), 0);
      const paid = units.reduce((s,u) => s + this.unitPayments(u).reduce((s2,pay) => s2 + instPaid(pay), 0), 0);
      const exps = this.expensesByProp(p.id).reduce((s,e) => s + (e.amount||0), 0);
      const occupied = units.filter(u => u.status==="مستأجرة").length;
      return { name: p.name, rent, paid, exps, net: paid - exps, units: units.length, occupied, occRate: units.length ? occupied/units.length : 0 };
    });

    return `
    <div class="sec-title">📊 مؤشرات الأداء الرئيسية</div>
    <div class="grid3" style="margin-bottom:24px">
      <div class="kpi-card"><div class="kpi-val" style="color:var(--gold)">${sar(totalRent)}</div><div class="kpi-lbl">إيجارات سنوية</div></div>
      <div class="kpi-card"><div class="kpi-val" style="color:var(--green)">${sar(rev)}</div><div class="kpi-lbl">إجمالي المحصّل</div></div>
      <div class="kpi-card"><div class="kpi-val" style="color:var(--orange)">${sar(exp)}</div><div class="kpi-lbl">المصروفات</div></div>
      <div class="kpi-card"><div class="kpi-val" style="color:${net>=0?'var(--green)':'var(--red)'}">${sar(net)}</div><div class="kpi-lbl">صافي الدخل</div></div>
      <div class="kpi-card"><div class="kpi-val" style="color:var(--blue)">${pct(occ)}</div><div class="kpi-lbl">نسبة الإشغال</div></div>
      <div class="kpi-card"><div class="kpi-val" style="color:var(--purple)">${pct(coll)}</div><div class="kpi-lbl">نسبة التحصيل</div></div>
    </div>

    <div class="sec-title">🏢 مقارنة العقارات</div>
    ${propStats.length > 0 ? `
    <table class="tbl">
      <tr><th>العقار</th><th>الوحدات</th><th>الإشغال</th><th>الإيجار</th><th>المحصّل</th><th>الصافي</th></tr>
      ${propStats.map(p => `
        <tr>
          <td style="font-weight:700">${p.name}</td>
          <td>${p.units}</td>
          <td><span class="badge ${p.occRate>=.8?'badge-green':p.occRate>=.5?'badge-orange':'badge-red'}">${pct(p.occRate)}</span></td>
          <td>${sar(p.rent)}</td>
          <td style="color:var(--green)">${sar(p.paid)}</td>
          <td style="color:${p.net>=0?'var(--green)':'var(--red)'}">${sar(p.net)}</td>
        </tr>`).join("")}
    </table>` : `<div class="empty">لا توجد عقارات للمقارنة</div>`}

    <div class="sec-title" style="margin-top:24px">💰 مركز التكلفة</div>
    <div class="grid2">
      <div class="stat-box"><div class="val" style="color:var(--green)">${sar(rev)}</div><div class="lbl">إجمالي الإيرادات</div></div>
      <div class="stat-box"><div class="val" style="color:var(--orange)">${sar(exp)}</div><div class="lbl">إجمالي المصروفات</div></div>
      <div class="stat-box"><div class="val" style="color:${net>=0?'var(--green)':'var(--red)'}">${sar(net)}</div><div class="lbl">صافي الربح</div></div>
      <div class="stat-box"><div class="val">${exp>0?Math.round(rev/exp*100)/100:0}</div><div class="lbl">نسبة الإيراد/المصروف</div></div>
    </div>`;
  }

  // ============================================================
  // EVENT HANDLING
  // ============================================================
  attachEvents() {
    const $ = id => document.getElementById(id);
    const $$ = sel => document.querySelectorAll(sel);

    // Login
    if ($("login-btn")) {
      $("login-btn").onclick = () => {
        const email = $("login-email")?.value;
        const pass = $("login-pass")?.value;
        if (email && pass) this.login(email, pass);
      };
      $("login-pass")?.addEventListener("keydown", e => { if (e.key==="Enter") $("login-btn").click(); });
    }

    // Top bar
    if ($("back-btn")) $("back-btn").onclick = () => {
      const s = this.state;
      if (s.page === "unit") this.setState({ page: "property", selectedUnit: null });
      else if (s.page === "property") this.setState({ page: "dashboard", selectedProp: null });
      else this.setState({ page: "dashboard" });
    };
    if ($("save-btn")) $("save-btn").onclick = () => { this.saveData(); this.showToast("تم الحفظ"); };
    if ($("logout-btn")) $("logout-btn").onclick = () => this.logout();

    // Navigation
    $$("[data-nav]").forEach(el => {
      el.onclick = () => {
        const page = el.dataset.nav;
        if (page === "more") { this.setState({ modal: "more" }); return; }
        this.setState({ page, modal: null });
      };
    });

    // Go to property
    $$("[data-goto-prop]").forEach(el => {
      el.onclick = () => this.setState({ page: "property", selectedProp: el.dataset.gotoProp });
    });

    // Go to unit
    $$("[data-goto-unit]").forEach(el => {
      el.onclick = () => this.setState({ page: "unit", selectedUnit: el.dataset.gotoUnit });
    });

    // Add buttons
    if ($("add-prop-btn")) $("add-prop-btn").onclick = () => this.setState({ modal: "addProp", form: {} });
    if ($("add-owner-btn")) $("add-owner-btn").onclick = () => this.setState({ modal: "addOwner", form: {} });
    if ($("add-maint-btn")) $("add-maint-btn").onclick = () => this.setState({ modal: "addMaint", form: {} });
    if ($("add-broker-btn")) $("add-broker-btn").onclick = () => this.setState({ modal: "addBroker", form: {} });
    if ($("add-project-btn")) $("add-project-btn").onclick = () => this.setState({ modal: "addProject", form: {} });

    $$("[data-add-unit]").forEach(el => {
      el.onclick = e => { e.stopPropagation(); this.setState({ modal: "addUnit", form: { propId: el.dataset.addUnit } }); };
    });

    $$("[data-add-exp]").forEach(el => {
      el.onclick = () => this.setState({ modal: "addExp", form: { propId: el.dataset.addExp } });
    });

    $$("[data-add-installment]").forEach(el => {
      el.onclick = () => this.setState({ modal: "addInst", form: { unitId: el.dataset.addInstallment } });
    });

    // Import payments from Excel (EJAR format)
    $$("[data-import-payments]").forEach(el => {
      el.onchange = e => {
        const file = e.target.files[0];

    $$("[data-edit-unit]").forEach(el => {

        if (u) this.setState({ modal: "editUnit", form: {...u} });
      };

    $$("[data-del-unit]").forEach(el => {
      el.onclick = e => {
        e.stopPropagation();
        if (confirm("هل تريد حذف هذه الوحدة؟")) {
          const id = el.dataset.delUnit;
          const u = this.units.find(x => x.id === id);
          this.state.data.units = this.units.filter(x => x.id !== id);

          this.setState({ page: "property" });
          this.showToast("تم حذف الوحدة");
        }
      };

    $$("[data-edit-owner]").forEach(el => {
      el.onclick = e => {
        e.stopPropagation();
        const o = this.owners.find(x => x.id === el.dataset.editOwner);
        if (o) this.setState({ modal: "editOwner", form: {...o} });
      };
    });

    $$("[data-del-owner]").forEach(el => {
      el.onclick = e => {
        e.stopPropagation();
        if (confirm("هل تريد حذف هذا المالك؟")) {
          this.state.data.owners = this.owners.filter(o => o.id !== el.dataset.delOwner);
          this.saveData();
          this.render();
          this.showToast("تم الحذف");
        }
      };
    });

    $$("[data-del-maint]").forEach(el => {
      el.onclick = () => {
        if (confirm("حذف؟")) {
          this.state.data.maintenance = this.maintenance.filter(m => m.id !== el.dataset.delMaint);
          this.saveData(); this.render();
        }
      };
    });

    // Modal close
    if ($("modal-bg")) $("modal-bg").onclick = e => { if (e.target.id === "modal-bg") this.setState({ modal: null }); };
    if ($("close-modal")) $("close-modal").onclick = () => this.setState({ modal: null });

    // Modal save
    if ($("modal-save")) $("modal-save").onclick = () => this.handleModalSave();

    // Contract extraction
    if ($("contract-file")) {
      $("contract-file").onchange = e => {
        const file = e.target.files[0];
        if (!file) return;
        const fn = $("file-name");
        const btn = $("extract-btn");
        if (fn) { fn.textContent = "📄 " + file.name + " (" + (file.size/1024).toFixed(0) + " KB)"; fn.style.display = "block"; }
        if (btn) { btn.disabled = false; btn.style.opacity = "1"; }
        this._contractFile = file;
      };
    }
    if ($("extract-btn")) {
      $("extract-btn").onclick = () => this.extractContractData();
    }

    // Export
    if ($("export-btn")) $("export-btn").onclick = () => {
      const blob = new Blob([JSON.stringify(this.state.data, null, 2)], { type: "application/json" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = `baho-backup-${today()}.json`;
      a.click();
    };

    // Import
    if ($("import-input")) $("import-input").onchange = e => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        try {
          const data = JSON.parse(ev.target.result);
          this.state.data = data;
          this.saveData();
          this.render();
          this.showToast("تم استيراد البيانات");
        } catch(err) { this.showToast("خطأ في الملف", "error"); }
      };
      reader.readAsText(file);
    };
  }

  // ============================================================
  // SMART CONTRACT EXTRACTION (PDF.js — no API needed)
  // ============================================================
  async extractContractData() {
    const file = this._contractFile;
    if (!file) { this.showToast("اختر ملف العقد أولاً", "error"); return; }

    const statusEl = document.getElementById("extract-status");
    const btn = document.getElementById("extract-btn");
    
    if (statusEl) {
      statusEl.style.display = "block";
      statusEl.style.background = "rgba(96,165,250,.1)";
      statusEl.style.color = "var(--blue)";
      statusEl.innerHTML = "⏳ جارِ قراءة العقد واستخراج البيانات...";
    }
    if (btn) { btn.disabled = true; btn.textContent = "⏳ جارِ الاستخراج..."; }

    try {
      const ext = file.name.split(".").pop().toLowerCase();
      let fullText = "";
      let rows = [];

      if (ext === "pdf") {
        if (!window.pdfjsLib) {
          await new Promise((resolve, reject) => {
            const s = document.createElement("script");
            s.src = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js";
            s.onload = resolve;
            s.onerror = () => reject(new Error("فشل تحميل مكتبة قراءة PDF"));
            document.head.appendChild(s);
          });
          pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
        }
        const ab = await file.arrayBuffer();
        const pdf = await pdfjsLib.getDocument({ data: ab }).promise;
        
        // Extract items WITH positions for proper ordering
        const allItems = [];
        for (let i = 1; i <= Math.min(pdf.numPages, 4); i++) {
          const pg = await pdf.getPage(i);
          const ct = await pg.getTextContent();
          ct.items.forEach(item => {
            if (item.str.trim()) {
              allItems.push({
                text: item.str.trim(),
                x: Math.round(item.transform[4]),
                y: Math.round(item.transform[5]),
                page: i
              });
            }
          });
        }
        
        // Sort by page, then Y (descending = top first), then X (left to right)
        allItems.sort((a, b) => {
          if (a.page !== b.page) return a.page - b.page;
          const yDiff = b.y - a.y;
          if (Math.abs(yDiff) > 5) return yDiff;
          return a.x - b.x;
        });
        
        // Build row-based text (items on same Y = same row)
        let lastY = -999;
        let currentRow = [];
        for (const item of allItems) {
          if (Math.abs(item.y - lastY) > 5) {
            if (currentRow.length) rows.push(currentRow.join(" "));
            currentRow = [item.text];
            lastY = item.y;
          } else {
            currentRow.push(item.text);
          }
        }
        if (currentRow.length) rows.push(currentRow.join(" "));
        
        fullText = rows.join("\n");
        
        // Also build a simple concatenated version
        const rawText = allItems.map(x => x.text).join(" ");
      } else {
        throw new Error("حالياً يدعم ملفات PDF فقط");
      }

      if (!fullText || fullText.trim().length < 50) {
        throw new Error("لم يتم العثور على نص كافٍ في الملف");
      }

      // Normalize
      const t = fullText.replace(/\s+/g, " ");
      const tNum = t.replace(/(\d)\s+(\d)/g, "$1$2"); // merge split digits
      const result = {};
      const found = [];
      const missing = [];
      let m;

      // Helper: reverse Arabic text that PDF.js extracts backwards
      function fixArabic(str) {
        if (!str) return str;
        // Check if text looks reversed (Arabic chars present)
        const hasArabic = /[\u0600-\u06FF]/.test(str);
        if (!hasArabic) return str;
        // Reverse character order
        return str.split("").reverse().join("").trim();
      }

      // Helper: find text item near English label in rows
      function findNear(label, searchIn) {
        const idx = searchIn.indexOf(label);
        if (idx === -1) return null;
        // Get surrounding context (200 chars after label)
        return searchIn.substring(idx, idx + 200);
      }

      // === Use ENGLISH labels from bilingual EJAR contract ===

      // 1. Contract Number (11 digits) — near "Contract No" or "1-0 /"
      m = tNum.match(/Contract[\s.]*No[\s.:]*(?:1[\s-]*0[\s\/]*)?(\d{11})/i);
      if (!m) m = tNum.match(/1[\s-]*0[\s\/]+(\d{11})/);
      if (!m) m = tNum.match(/(\d{11})[\s.]*(?:No|Contract)/i);
      if (!m) { // Search all 11-digit numbers in first part of text
        const nums11 = [...tNum.matchAll(/\b(\d{11})\b/g)].map(x => x[1]);
        if (nums11.length > 0) m = [null, nums11[0]];
      }
      if (m) { result.contractNo = m[1]; found.push("رقم العقد"); } else missing.push("رقم العقد");

      // 2. Start Date — near "Tenancy Start Date" or "Start Date"
      m = tNum.match(/(?:Tenancy\s*)?Start\s*Date[\s:]*(\d{4}-\d{2}-\d{2})/i);
      if (!m) m = tNum.match(/(\d{4}-\d{2}-\d{2})[\s]*(?:Tenancy\s*)?Start/i);
      if (m) { result.startDate = m[1]; found.push("تاريخ البداية"); } else missing.push("تاريخ البداية");

      // 3. End Date — near "Tenancy End Date" or "End Date"  
      m = tNum.match(/(?:Tenancy\s*)?End\s*Date[\s:]*(\d{4}-\d{2}-\d{2})/i);
      if (!m) m = tNum.match(/(\d{4}-\d{2}-\d{2})[\s]*(?:Tenancy\s*)?End/i);
      if (m) { result.endDate = m[1]; found.push("تاريخ النهاية"); } else missing.push("تاريخ النهاية");

      // 4. Tenant Name — from "Tenant Data" section, near "Name"
      // Strategy: find rows between "Tenant Data" and "Tenant Representative"
      const tenantRows = [];
      let inTenant = false;
      for (const row of rows) {
        if (/Tenant\s*Data|بيانات المستأجر/i.test(row)) inTenant = true;
        else if (inTenant && /Representative|ممثل|Brokerage|وساطة/i.test(row)) break;
        if (inTenant) tenantRows.push(row);
      }
      const tenantBlock = tenantRows.join(" ");
      
      // Find name: look for text near "Name" in tenant section
      m = tenantBlock.match(/Name[\s:]*([^\n]+?)(?:\s*Name|\s*Nationality|\s*$)/i);
      if (m) {
        let name = m[1].replace(/Name/gi,"").replace(/\d+/g,"").trim();
        name = fixArabic(name);
        // Clean up extra spaces between letters
        name = name.replace(/\s{2,}/g, " ").trim();
        if (name.length > 2) { result.tenant = name; found.push("المستأجر"); }
        else missing.push("المستأجر");
      } else {
        // Fallback: search in rows for Arabic name pattern after Tenant Data
        for (const row of tenantRows) {
          const arabicWords = row.match(/[\u0600-\u06FF]+/g);
          if (arabicWords && arabicWords.length >= 2) {
            let name = arabicWords.join(" ");
            // Check if reversed
            if (name.length > 3) {
              result.tenant = fixArabic(name) || name;
              found.push("المستأجر");
              break;
            }
          }
        }
        if (!result.tenant) missing.push("المستأجر");
      }

      // 5. Tenant Phone — from tenant section, near "Mobile"
      const tenantNumBlock = tenantBlock.replace(/(\d)\s+(\d)/g, "$1$2");
      m = tenantNumBlock.match(/Mobile[\s.]*(?:No)?[\s.:]*\+?(\d{10,15})/i);
      if (!m) m = tenantNumBlock.match(/\+?(966\d{9})/);
      if (!m) {
        // Search all 966 phones in document - tenant phone is usually 2nd one
        const all966 = [...tNum.matchAll(/\+?(966\d{9})/g)].map(x => x[1]);
        // In EJAR: phones appear in order: مؤجر ← ممثل المؤجر ← المستأجر
        if (all966.length >= 3) m = [null, all966[2]]; // 3rd phone = tenant
        else if (all966.length >= 2) m = [null, all966[1]]; // 2nd phone
      }
      if (m) {
        let ph = m[1];
        if (ph.startsWith("966")) ph = "0" + ph.slice(3);
        result.phone = ph;
        found.push("الهاتف");
      } else missing.push("الهاتف");

      // 6. Annual Rent — near "Rent Annual" (NOT "Total")
      m = tNum.match(/Rent\s*Annual[\s:]*(\d[\d,]*\.?\d*)/i);
      if (!m) m = tNum.match(/(\d[\d,]*\.?\d*)\s*Rent\s*Annual/i);
      if (!m) m = tNum.match(/قيمة ا..يجار[\s:]*(\d[\d,]*\.?\d*)/i);
      if (m) { result.value = parseFloat(m[1].replace(/,/g,"")); found.push("الإيجار السنوي"); } else missing.push("الإيجار السنوي");

      // 7. Total Contract Value
      m = tNum.match(/(?:Total|اجمالي|إجمالي)[\s\S]*?(\d[\d,]*\.\d{2})/i);
      if (m) { result.totalContractValue = parseFloat(m[1].replace(/,/g,"")); found.push("إجمالي العقد"); }

      // 8. Number of Payments
      m = tNum.match(/(?:Number\s*of\s*Rent\s*)?Payments[\s:]*(\d{1,2})/i);
      if (!m) m = tNum.match(/(\d{1,2})\s*(?:Number\s*of\s*Rent\s*)?Payments/i);
      if (!m) m = tNum.match(/عدد دفعات[\s\S]*?(\d{1,2})/i);
      if (m) { result.installments = parseInt(m[1]); found.push("عدد الدفعات"); } else missing.push("عدد الدفعات");

      // 9. Payment Cycle
      m = t.match(/(نصف سنو[يى]|ربع سنو[يى]|شهري|سنوي|مرن)/i);
      if (m) { result.paymentCycle = m[1]; found.push("دورة السداد"); }

      // 10. Payment Method  
      m = t.match(/(?:Available|قنوات)[\s\S]*?(مدى|سداد|تحويل|كاش|شيك)/i);
      if (m) { let pm=m[1]; if(pm.includes("مدى")||pm.includes("سداد"))pm="تحويل"; result.payMethod=pm; found.push("طريقة الدفع"); } else missing.push("طريقة الدفع");

      // 11. Unit Type & Number
      m = t.match(/Unit\s*Type[\s:]*([\u0600-\u06FF\s]+)/i);
      let uType = m ? fixArabic(m[1]).replace(/[َّ]/g,"").replace("فيال","فيلا").trim() : "";
      if (!uType) { m = t.match(/(فيا?ل|فيلا|شقة|دور|محل|مكتب|عمارة|برج|استراحة)/i); if(m) uType=m[1].replace("فيال","فيلا"); }
      m = tNum.match(/Unit[\s.]*No[\s.:]*(\d+)/i);
      const uNo = m ? m[1] : "";
      if (uType||uNo) { result.name=(uType+" "+uNo).trim(); result.unitType=uType; found.push("الوحدة"); } else missing.push("الوحدة");

      // 12. Unit Area
      m = tNum.match(/(?:Unit\s*)?Area[\s:]*(\d+\.?\d*)/i);
      if (m) { result.unitArea = m[1]; }

      // 13. Owner Name — from Lessor Data section
      const ownerRows = [];
      let inOwner = false;
      for (const row of rows) {
        if (/Lessor\s*Data|بيانات المؤ/i.test(row)) inOwner = true;
        else if (inOwner && /Representative|ممثل|بيانات/i.test(row) && !/المؤ/.test(row)) break;
        if (inOwner) ownerRows.push(row);
      }
      if (ownerRows.length > 0) {
        const ownerBlock = ownerRows.join(" ");
        m = ownerBlock.match(/Name[\s:]*([^\n]+?)(?:\s*Name|\s*Nationality)/i);
        if (m) { result.ownerName = fixArabic(m[1].replace(/Name/gi,"").replace(/\d+/g,"").trim()); }
      }

      // Smart: calc annual from total if needed
      if (result.totalContractValue && result.startDate && result.endDate && !result.value) {
        const yrs = Math.max(1, Math.round((new Date(result.endDate)-new Date(result.startDate))/(365.25*864e5)));
        result.value = Math.round(result.totalContractValue / yrs);
        found.push("الإيجار (محسوب)");
      }

      result.status = "مستأجرة";

      // === FILL FORM FIELDS DIRECTLY IN DOM — NO RE-RENDER ===
      const fieldMap = [
        ["f-name", result.name],
        ["f-tenant", result.tenant],
        ["f-contractNo", result.contractNo],
        ["f-startDate", result.startDate],
        ["f-endDate", result.endDate],
        ["f-value", result.value],
        ["f-installments", result.installments],
        ["f-phone", result.phone],
        ["f-status", result.status],
        ["f-payMethod", result.payMethod]
      ];

      let filledCount = 0;
      for (const [id, val] of fieldMap) {
        if (!val && val !== 0) continue;
        const el = document.getElementById(id);
        if (!el) continue;
        // Skip if user already typed something
        const cur = el.value?.trim();
        if (cur && cur !== "1" && cur !== "تحويل" && cur !== "مستأجرة") continue;
        el.value = String(val);
        // Green flash effect
        el.style.background = "rgba(74,222,128,.2)";
        el.style.borderColor = "#4ade80";
        setTimeout(() => { if(el) { el.style.background = ""; el.style.borderColor = ""; }}, 4000);
        filledCount++;
      }

      // Also update state.form so values persist if modal re-renders later
      Object.assign(this.state.form, {
        name: result.name || this.state.form.name,
        tenant: result.tenant || this.state.form.tenant,
        contractNo: result.contractNo || this.state.form.contractNo,
        status: result.status || this.state.form.status,
        startDate: result.startDate || this.state.form.startDate,
        endDate: result.endDate || this.state.form.endDate,
        value: result.value || this.state.form.value,
        installments: result.installments || this.state.form.installments,
        payMethod: result.payMethod || this.state.form.payMethod,
        phone: result.phone || this.state.form.phone
      });

      // Show success in status div — NO render call
      if (statusEl) {
        statusEl.style.display = "block";
        statusEl.style.background = "rgba(74,222,128,.1)";
        statusEl.style.color = "var(--green)";
        let html = `<strong>✅ تم استخراج ${filledCount} حقل وتعبئتها</strong>`;
        if (missing.length) html += `<br><span style="color:var(--orange)">⚠ لم يُعثر على: ${missing.join("، ")}</span>`;
        const extras = [];
        if (result.ownerName) extras.push("المؤجر: " + result.ownerName);
        if (result.unitType) extras.push("النوع: " + result.unitType);
        if (result.unitArea) extras.push("المساحة: " + result.unitArea + " م²");
        if (result.totalContractValue) extras.push("إجمالي العقد: " + sar(result.totalContractValue));
        if (result.paymentCycle) extras.push("دورة السداد: " + result.paymentCycle);
        if (extras.length) html += "<br><span style=\"font-size:11px;color:var(--txt2)\">📋 " + extras.join(" • ") + "</span>";
        html += "<br><span style=\"font-size:11px;color:var(--txt3)\">✏️ راجع وعدّل قبل الحفظ</span>";
        statusEl.innerHTML = html;
      }
      if (btn) { btn.disabled = false; btn.textContent = "🔍 استخراج البيانات"; }

    } catch (err) {
      console.error("Extraction error:", err);
      const errEl = document.getElementById("extract-status");
      if (errEl) {
        errEl.style.display = "block";
        errEl.style.background = "rgba(248,113,113,.1)";
        errEl.style.color = "var(--red)";
        errEl.innerHTML = `❌ ${err.message}<br><span style="font-size:11px">تأكد من أن ملف PDF يحتوي نص وليس صورة (scan)، أو أدخل البيانات يدوياً</span>`;
      }
      const errBtn = document.getElementById("extract-btn");
      if (errBtn) { errBtn.disabled = false; errBtn.textContent = "🔍 استخراج البيانات"; }
    }
  }

  // ============================================================
  // IMPORT PAYMENTS FROM EXCEL (EJAR Format)
  // ============================================================
  async importPaymentsFromExcel(file, unitId) {
    const statusEl = document.getElementById("import-status-" + unitId);

    if (statusEl) {
      statusEl.style.display = "block";
      statusEl.style.background = "rgba(96,165,250,.1)";
      statusEl.style.color = "var(--blue)";
      statusEl.innerHTML = "⏳ جارِ قراءة ملف الدفعات...";
    }

    try {
      // Load SheetJS if not loaded
      if (!window.XLSX) {
        await new Promise((resolve, reject) => {
          const s = document.createElement("script");
          s.src = "https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js";
          s.onload = resolve;
          s.onerror = () => reject(new Error("فشل تحميل مكتبة قراءة Excel"));
          document.head.appendChild(s);
        });
      }

      // Read file
      const data = await file.arrayBuffer();
      const wb = XLSX.read(data, { type: "array" });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const jsonData = XLSX.utils.sheet_to_json(ws, { defval: "" });

      if (!jsonData || jsonData.length === 0) {
        throw new Error("الملف فارغ أو لا يحتوي بيانات");
      }

      // Parse EJAR installments format
      // Columns: Installment Number (A), Issue date (B), Invoice Number (C),
      // Last date for due payment (D), Total amount\paid (E), Status (F),
      // Contract number (G), Contract start date (K), Contract end date (L)

      const payments = [];
      let contractNo = "";
      let startDate = "";
      let endDate = "";

      for (let i = 0; i < jsonData.length; i++) {
        const row = jsonData[i];

        // Get values by column header (English headers from EJAR)
        const instNum = row["Installment Number"] || row["رقم الدفعة"] || "";
        const issueDate = row["Issue date"] || row["تاريخ الإصدار"] || "";
        const dueDate = row["Last date for due payment"] || row["آخر موعد للسداد"] || issueDate;
        const amount = parseFloat(row["Total amount\\paid"] || row["Total amount/paid"] || row["المبلغ"] || 0);
        const status = row["Status"] || row["الحالة"] || "";
        const cNo = row["Contract number"] || row["رقم العقد"] || "";
        const cStart = row["Contract start date"] || row["تاريخ بداية العقد"] || "";
        const cEnd = row["Contract end date"] || row["تاريخ نهاية العقد"] || "";

        if (cNo) contractNo = String(cNo);
        if (cStart) startDate = this._parseEjarDate(cStart);
        if (cEnd) endDate = this._parseEjarDate(cEnd);

        if (!amount || amount <= 0) continue;

        const parsedDue = this._parseEjarDate(dueDate) || this._parseEjarDate(issueDate);
        const isPaid = status === "تم الدفع" || status.toLowerCase().includes("paid");

        payments.push({
          id: uid(),
          unitId: unitId,
          num: i + 1,
          dueDate: parsedDue,
          amount: amount,
          payments: isPaid ? [{ id: uid(), amount: amount, method: "منصة ايجار", date: parsedDue, notes: "مستورد من إيجار" }] : [],
          notes: isPaid ? "✅ مسدد (إيجار)" : "",
          ejarInstNo: String(instNum)
        });
      }

      if (payments.length === 0) {
        throw new Error("لم يتم العثور على دفعات صالحة في الملف");
      }

      // Remove old generated payments for this unit and replace with imported
      const existingManual = (this.state.data.payments || []).filter(p => p.unitId !== unitId);
      this.state.data.payments = [...existingManual, ...payments];

      // Update unit contract info if available
      const unit = this.units.find(u => u.id === unitId);
      if (unit) {
        if (contractNo) unit.contractNo = contractNo;
        if (startDate) unit.startDate = startDate;
        if (endDate) unit.endDate = endDate;
        // Calculate annual rent from payments
        const totalPayments = payments.reduce((s, p) => s + p.amount, 0);
        if (startDate && endDate) {
          const years = Math.max(1, Math.round((new Date(endDate) - new Date(startDate)) / (365.25 * 86400000)));
          unit.value = Math.round(totalPayments / years);
        }
        unit.installments = payments.length;
      }

      this.saveData();

      // Show success
      const paidCount = payments.filter(p => p.payments.length > 0).length;
      const unpaidCount = payments.length - paidCount;
      const totalAmount = payments.reduce((s, p) => s + p.amount, 0);
      const paidAmount = payments.filter(p => p.payments.length > 0).reduce((s, p) => s + p.amount, 0);

      if (statusEl) {
        statusEl.style.background = "rgba(74,222,128,.1)";
        statusEl.style.color = "var(--green)";
        statusEl.innerHTML = `<strong>✅ تم استيراد ${payments.length} دفعة بنجاح</strong>
          <br>💰 إجمالي: ${sar(totalAmount)}
          <br>✅ مسدد: ${paidCount} دفعة (${sar(paidAmount)})
          <br>⏳ غير مسدد: ${unpaidCount} دفعة (${sar(totalAmount - paidAmount)})
          ${contractNo ? `<br>📋 رقم العقد: ${contractNo}` : ""}`;
      }

      this.addAudit("استيراد دفعات من إيجار", `${file.name} — ${payments.length} دفعة — الوحدة: ${unit?.name || unitId}`);

      // Re-render to show new payments
      setTimeout(() => this.render(), 500);

    } catch (err) {
      console.error("Import error:", err);
      if (statusEl) {
        statusEl.style.display = "block";
        statusEl.style.background = "rgba(248,113,113,.1)";
        statusEl.style.color = "var(--red)";
        statusEl.innerHTML = `❌ ${err.message}`;
      }
    }
  }

  // Parse EJAR date format (DD-MM-YYYY or DD/MM/YYYY) to YYYY-MM-DD
  _parseEjarDate(dateStr) {
    if (!dateStr) return "";
    const s = String(dateStr).trim();
    // Already YYYY-MM-DD
    if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
    // DD-MM-YYYY or DD/MM/YYYY
    const m = s.match(/(\d{1,2})[-\/](\d{1,2})[-\/](\d{4})/);
    if (m) {
      const day = m[1].padStart(2, "0");
      const month = m[2].padStart(2, "0");
      return `${m[3]}-${month}-${day}`;
    }
    return s;
  }

  handleModalSave() {
    const m = this.state.modal;
    const getVal = id => document.getElementById(id)?.value || "";
    const getNum = id => Number(document.getElementById(id)?.value) || 0;

    if (m === "addProp" || m === "editProp") {
      const obj = {
        id: m === "editProp" ? this.state.form.id : uid(),
        name: getVal("f-name"), location: getVal("f-location"),
        type: getVal("f-type"), ownerId: getVal("f-ownerId")
      };
      if (!obj.name) { this.showToast("أدخل اسم العقار", "error"); return; }
      if (m === "editProp") {
        const idx = this.state.data.properties.findIndex(p => p.id === obj.id);
        if (idx >= 0) this.state.data.properties[idx] = obj;
      } else {
        this.state.data.properties.push(obj);
      }
      this.addAudit(m === "editProp" ? "تعديل عقار" : "إضافة عقار", obj.name);

    } else if (m === "addUnit" || m === "editUnit") {
      const obj = {
        id: m === "editUnit" ? this.state.form.id : uid(),
        propId: m === "editUnit" ? this.state.form.propId : this.state.form.propId,
        name: getVal("f-name"), tenant: getVal("f-tenant"),
        contractNo: getVal("f-contractNo"), status: getVal("f-status"),
        startDate: getVal("f-startDate"), endDate: getVal("f-endDate"),
        value: getNum("f-value"), installments: getNum("f-installments") || 1,
        payMethod: getVal("f-payMethod"), phone: getVal("f-phone")
      };
      if (!obj.name) { this.showToast("أدخل اسم الوحدة", "error"); return; }
      if (m === "editUnit") {
        const idx = this.state.data.units.findIndex(u => u.id === obj.id);
        if (idx >= 0) this.state.data.units[idx] = obj;
      } else {
        this.state.data.units.push(obj);
        // Generate payments
        const dates = genDueDates(obj.startDate, obj.installments);
        const amt = Math.round(obj.value / obj.installments);
        dates.forEach((d, i) => {
          this.state.data.payments.push({
            id: uid(), unitId: obj.id, num: i+1, dueDate: d, amount: amt, payments: [], notes: ""
          });
        });
      }
      this.addAudit(m === "editUnit" ? "تعديل وحدة" : "إضافة وحدة", obj.name);

    } else if (m === "addOwner" || m === "editOwner") {
      const obj = {
        id: m === "editOwner" ? this.state.form.id : uid(),
        name: getVal("f-name"), phone: getVal("f-phone"), notes: getVal("f-notes")
      };
      if (!obj.name) { this.showToast("أدخل اسم المالك", "error"); return; }
      if (m === "editOwner") {
        const idx = this.state.data.owners.findIndex(o => o.id === obj.id);
        if (idx >= 0) this.state.data.owners[idx] = obj;
      } else {
        this.state.data.owners.push(obj);
      }
      this.addAudit(m === "editOwner" ? "تعديل مالك" : "إضافة مالك", obj.name);

    } else if (m === "addExp") {
      const obj = {
        id: uid(), propId: this.state.form.propId,
        date: getVal("f-date"), type: getVal("f-type"),
        amount: getNum("f-amount"), notes: getVal("f-notes")
      };
      this.state.data.expenses.push(obj);
      this.addAudit("إضافة مصروف", `${obj.type} - ${sar(obj.amount)}`);

    } else if (m === "payInst") {
      const instId = this.state.form.instId;
      const unitId = this.state.form.unitId;
      const amount = getNum("f-paidAmount");
      const method = getVal("f-method");
      const notes = getVal("f-notes");
      const paidDate = getVal("f-paidDate");

      // Find or create payment record
      let inst = this.state.data.payments.find(p => p.id === instId);
      if (!inst) {
        // Generate and store payments for this unit
        const unit = this.units.find(u => u.id === unitId);
        if (unit) {
          const dates = genDueDates(unit.startDate, unit.installments || 1);
          const amt = Math.round(unit.value / (unit.installments || 1));
          dates.forEach((d, i) => {
            this.state.data.payments.push({
              id: `${unit.id}_p${i}`, unitId: unit.id, num: i+1, dueDate: d, amount: amt, payments: [], notes: ""
            });
          });
          inst = this.state.data.payments.find(p => p.id === instId);
        }
      }
      if (inst) {
        if (!inst.payments) inst.payments = [];
        inst.payments.push({ id: uid(), amount, method, date: paidDate, notes });
        this.addAudit("تسجيل دفعة", `${sar(amount)} - ${method}`);
      }

    } else if (m === "addMaint") {
      const obj = {
        id: uid(), title: getVal("f-title"), unitId: getVal("f-unitId"),
        date: getVal("f-date"), status: getVal("f-status"),
        cost: getNum("f-cost"), notes: getVal("f-notes")
      };
      this.state.data.maintenance.push(obj);
      this.addAudit("طلب صيانة", obj.title);

    } else if (m === "addBroker") {
      const obj = {
        id: uid(), name: getVal("f-name"), phone: getVal("f-phone"),
        commission: getNum("f-commission"), email: getVal("f-email"), active: true
      };
      this.state.data.brokers.push(obj);
      this.addAudit("إضافة وسيط", obj.name);

    } else if (m === "addProject") {
      const obj = {
        id: uid(), name: getVal("f-name"), location: getVal("f-location"),
        budget: getNum("f-budget"), startDate: getVal("f-startDate"),
        phases: [
          { name: "التخطيط", status: "جديد", cost: 0 },
          { name: "التصميم", status: "جديد", cost: 0 },
          { name: "التنفيذ", status: "جديد", cost: 0 },
          { name: "التشطيب", status: "جديد", cost: 0 }
        ]
      };
      this.state.data.projects.push(obj);
      this.addAudit("إضافة مشروع", obj.name);
    }

    this.saveData();
    this.setState({ modal: null, form: {} });
    this.showToast("تم الحفظ بنجاح");
  }
}
