<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>نظام إدارة العقارات — بهو المدينة</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
--bg:#050a15;--bg2:#0a1128;--bg3:#0e1630;--card:linear-gradient(145deg,rgba(16,24,46,.85),rgba(8,14,30,.9));
--gold:#c9a96e;--gold2:#a8853a;--gold-g:linear-gradient(135deg,#c9a96e,#e8d5a8);
--green:#4ade80;--red:#f87171;--yellow:#facc15;--blue:#60a5fa;--purple:#a78bfa;--orange:#fb923c;
--txt:#e2e8f0;--txt2:#94a3b8;--txt3:#586580;--txt4:#475569;
--border:rgba(201,169,110,.08);--border2:rgba(201,169,110,.15);
}
*{box-sizing:border-box;margin:0;padding:0;font-family:'Noto Sans Arabic',sans-serif}
body{background:var(--bg);color:var(--txt);min-height:100vh;direction:rtl}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:rgba(201,169,110,.15);border-radius:4px}

/* Header */
.hd{background:linear-gradient(135deg,rgba(12,18,37,.96),rgba(17,27,51,.96));backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.bc{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--txt3)}
.bc span{cursor:pointer;transition:.2s}.bc span:hover{color:var(--gold)}.bc .on{color:var(--gold);font-weight:700}
.hd-actions{display:flex;align-items:center;gap:8px}

/* Save Bar */
.svb{position:fixed;bottom:0;left:0;right:0;background:linear-gradient(135deg,rgba(10,15,30,.97),rgba(14,22,42,.97));backdrop-filter:blur(12px);border-top:1px solid var(--border);padding:9px 20px;display:flex;align-items:center;justify-content:space-between;z-index:40;direction:rtl}

/* Main */
.mn{padding:20px 24px;max-width:1440px;margin:0 auto;padding-bottom:70px}

/* Cards */
.cd{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;transition:.3s}
.cd:hover{border-color:var(--border2)}
.ck{cursor:pointer}.ck:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,0,0,.3)}

/* KPI */
.kpi-grid{display:grid;gap:8px;margin-bottom:18px}
.kpi{background:linear-gradient(145deg,rgba(16,24,46,.7),rgba(8,14,30,.8));border:1px solid var(--border);border-radius:10px;padding:14px 10px;text-align:center}
.kpi .kv{font-size:16px;font-weight:800;margin-top:4px}.kpi .kl{font-size:9.5px;color:var(--txt3);letter-spacing:.3px}

/* Tables */
table{width:100%;border-collapse:collapse;font-size:11.5px}
th{background:rgba(201,169,110,.06);color:var(--gold);padding:9px 7px;font-weight:600;white-space:nowrap;border-bottom:1.5px solid rgba(201,169,110,.12);text-align:center}
td{padding:7px;border-bottom:1px solid rgba(255,255,255,.02);text-align:center;white-space:nowrap}
tr:hover td{background:rgba(201,169,110,.02)}
.tw{overflow:auto;border-radius:10px;border:1px solid var(--border)}
tfoot td{background:rgba(201,169,110,.04)!important;font-weight:700;border-top:1.5px solid rgba(201,169,110,.12)}

/* Buttons */
.b{padding:7px 15px;border-radius:7px;border:none;cursor:pointer;font-family:inherit;font-weight:600;font-size:11.5px;transition:all .2s;display:inline-flex;align-items:center;gap:5px}
.b:active{transform:scale(.97)}
.bg_{background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--bg)}.bg_:hover{box-shadow:0 4px 18px rgba(201,169,110,.25)}
.gh{background:rgba(255,255,255,.03);color:var(--gold);border:1px solid var(--border2)}.gh:hover{background:rgba(201,169,110,.06)}
.rd{background:rgba(220,50,50,.08);color:var(--red);border:1px solid rgba(220,50,50,.1)}
.gn{background:rgba(34,197,94,.08);color:var(--green);border:1px solid rgba(34,197,94,.1)}
.wa{background:linear-gradient(135deg,#25D366,#128C7E);color:#fff;border:none}
.sv{background:linear-gradient(135deg,#3b82f6,#1d4ed8);color:#fff;border:none}
.sm{padding:3px 9px;font-size:10px;border-radius:5px}

/* Badges */
.bd{padding:3px 9px;border-radius:14px;font-size:9.5px;font-weight:600;display:inline-block}
.bdg{background:rgba(34,197,94,.1);color:var(--green)}.bdr{background:rgba(239,68,68,.1);color:var(--red)}
.bdy{background:rgba(234,179,8,.1);color:var(--yellow)}.bdb{background:rgba(59,130,246,.1);color:var(--blue)}
.bdp{background:rgba(168,85,247,.1);color:var(--purple)}.bdo{background:rgba(249,115,22,.1);color:var(--orange)}

/* Forms */
input,select,textarea{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:7px;padding:9px 12px;color:var(--txt);font-family:inherit;font-size:11.5px;width:100%;direction:rtl;transition:border .2s}
input:focus,select:focus,textarea:focus{outline:none;border-color:rgba(201,169,110,.4);box-shadow:0 0 0 3px rgba(201,169,110,.06)}
select option{background:#0d1528;color:var(--txt)}
textarea{resize:vertical;min-height:90px;line-height:1.7}
label{font-size:10px;font-weight:600;color:var(--txt3);margin-bottom:3px;display:block;letter-spacing:.3px}

/* Modal */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(6px);z-index:100;display:flex;align-items:center;justify-content:center}
.mb{background:linear-gradient(155deg,#111c34,#0a1120);border:1px solid rgba(201,169,110,.12);border-radius:14px;padding:24px;width:92%;max-width:580px;max-height:88vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.st{font-size:14px;font-weight:700;color:var(--gold);margin-bottom:12px;padding-bottom:7px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:9px}

/* Progress */
.pg{height:5px;background:rgba(255,255,255,.03);border-radius:3px;overflow:hidden}
.pf{height:100%;border-radius:3px;transition:width .5s ease}

/* Tabs */
.tb{display:flex;gap:3px;background:rgba(255,255,255,.02);border-radius:9px;padding:3px;margin-bottom:16px;border:1px solid var(--border);flex-wrap:wrap}
.ti{padding:7px 14px;border-radius:7px;cursor:pointer;font-size:11px;font-weight:500;color:var(--txt3);transition:.2s;display:flex;align-items:center;gap:4px}
.ti:hover{color:var(--gold)}.ti.on{background:linear-gradient(135deg,rgba(201,169,110,.1),rgba(201,169,110,.03));color:var(--gold);font-weight:700}

/* Unit tabs */
.ut{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:12px}
.utb{padding:6px 13px;border-radius:7px;cursor:pointer;font-size:11px;font-weight:600;border:1px solid var(--border);background:rgba(255,255,255,.015);color:var(--txt3);transition:.2s}
.utb:hover{color:var(--gold);border-color:var(--border2)}
.utb.on{background:rgba(201,169,110,.08);color:var(--gold);border-color:rgba(201,169,110,.25)}

/* Installment cards */
.ic{border:1px solid rgba(255,255,255,.03);border-radius:11px;overflow:hidden;margin-bottom:6px;transition:.2s}
.ic:hover{border-color:rgba(201,169,110,.12)}
.ic-f{border-right:3px solid var(--green)}.ic-p{border-right:3px solid var(--yellow)}
.ic-n{border-right:3px solid #475569}.ic-o{border-right:3px solid var(--red);background:rgba(239,68,68,.015)}
.ab{border-radius:7px;padding:5px 9px;text-align:center;min-width:68px}
.ab .al{font-size:8px;opacity:.7}.ab .av{font-size:13px;font-weight:800}

/* Owner/Property cards */
.oc{border:1px solid var(--border);border-radius:14px;overflow:hidden;cursor:pointer;transition:.35s;background:linear-gradient(145deg,rgba(14,22,42,.9),rgba(8,13,28,.95))}
.oc:hover{border-color:var(--border2);transform:translateY(-3px);box-shadow:0 12px 36px rgba(0,0,0,.25)}
.oc-h{padding:16px 20px;background:linear-gradient(135deg,rgba(20,30,55,.9),rgba(12,18,38,.95));border-bottom:1px solid rgba(201,169,110,.05)}
.oc-b{padding:14px 20px}

/* Maintenance */
.mt-card{background:rgba(255,255,255,.015);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:8px;transition:.2s}
.mt-card:hover{border-color:var(--border2)}
.mt-new{border-right:3px solid var(--blue)}.mt-prog{border-right:3px solid var(--yellow)}
.mt-done{border-right:3px solid var(--green)}.mt-rej{border-right:3px solid var(--red)}

/* Audit log */
.log-entry{padding:10px 14px;border-radius:8px;margin-bottom:5px;background:rgba(255,255,255,.015);border:1px solid rgba(255,255,255,.02);font-size:11px}

/* Notification bell */
.bell{position:relative;cursor:pointer}.bell-count{position:absolute;top:-4px;right:-6px;background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff;font-size:8px;font-weight:800;border-radius:10px;padding:1px 4px;min-width:14px;text-align:center}

/* Print */
@media print{.hd,.tb,.b,.ut,.svb,.no-print{display:none!important}.mn{padding:0!important}*{color:#000!important;background:#fff!important;border-color:#ddd!important}.kpi{border:1px solid #ddd!important}th{background:#f5f0e0!important;color:#333!important}}
@media(max-width:768px){.mn{padding:14px 16px;padding-bottom:70px}.fg{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="app"></div>
<script>
/* ═══════════════════════════════════════════
   نظام إدارة العقارات — المرحلة الأولى والثانية
   بهو المدينة للتأسيس والتشغيل العقاري
   ═══════════════════════════════════════════ */

// ═══ Utilities ═══
const $=n=>(n||0).toLocaleString('ar-SA');
const R=n=>`${$(n)} ر.س`;
const P=n=>`${Math.round((n||0)*100)}%`;
const DL=e=>{try{return Math.max(0,Math.round((new Date(e)-new Date())/864e5))}catch{return 0}};
const ID=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const TD=()=>new Date().toISOString().split('T')[0];
const TS=()=>new Date().toLocaleString('ar-SA',{dateStyle:'short',timeStyle:'short'});
const iP=i=>(i.py||[]).reduce((s,p)=>s+(p.a||0),0);
const iR=i=>Math.max(0,(i.am||0)-iP(i));
const iF=i=>iR(i)<=0;
const gDD=(s,c)=>{if(!c||!s)return[];const d=new Date(s),v=Math.round(12/c),r=[];for(let i=0;i<c;i++){const x=new Date(d);x.setMonth(x.getMonth()+v*i);r.push(x.toISOString().split('T')[0])}return r};
const h=s=>s.replace(/</g,'&lt;').replace(/>/g,'&gt;');

// ═══ Constants ═══
const ET=['صيانة','كهرباء','مياه','نظافة','سباكة','دهانات','أجهزة','إدارية','تأمين','أخرى'];
const PM=['تحويل بنكي','كاش','منصة ايجار','شيك','حوالة'];
const US=['مستأجرة','شاغرة','صيانة','محجوزة'];
const PS=['مسدد','غير مسدد','جزئي'];
const PT=['سكني','تجاري','مكتبي','فندقي','مختلط'];
const MS=['جديد','قيد التنفيذ','مكتمل','مرفوض']; // Maintenance statuses
const MP=['عادي','متوسط','عاجل','طارئ']; // Maintenance priority

// ═══ State ═══
let state = {
  ow:[{id:'o1',nm:'بهو المدينة',ph:'0500000000',nt:'بهو المدينة للتأسيس والتشغيل العقاري'}],
  pr:[{id:'p1',oI:'o1',nm:'عمارة الممشى',loc:'المدينة المنورة',tp:'سكني'}],
  un:[
    {id:'u1',pI:'p1',nm:'شقة 1',cn:'10135318068',tn:'يوسف الفيروز شركة',us:'مستأجرة',ds:'2026-01-01',de:'2026-12-30',pm:'منصة ايجار',v:22000,ni:1,ph:'509355566'},
    {id:'u2',pI:'p1',nm:'شقة 2',cn:'10065470490',tn:'أسامة النهاري',us:'مستأجرة',ds:'2026-01-01',de:'2026-12-30',pm:'تحويل بنكي',v:22000,ni:4,ph:'598457112'},
    {id:'u3',pI:'p1',nm:'شقة 3',cn:'10883046495',tn:'عبدالله احمد',us:'مستأجرة',ds:'2026-01-01',de:'2026-12-30',pm:'منصة ايجار',v:26000,ni:4,ph:''},
    {id:'u4',pI:'p1',nm:'شقة 4',cn:'10534198899',tn:'حاتم الحربي',us:'مستأجرة',ds:'2026-01-01',de:'2026-12-30',pm:'تحويل بنكي',v:26000,ni:2,ph:''},
    {id:'u5',pI:'p1',nm:'شقة 5',cn:'',tn:'محمد حسين',us:'مستأجرة',ds:'2026-01-01',de:'2026-12-30',pm:'',v:26000,ni:0,ph:''},
    {id:'u6',pI:'p1',nm:'شقة 6',cn:'10597253591',tn:'محمد خان',us:'مستأجرة',ds:'2026-01-01',de:'2026-12-30',pm:'منصة ايجار',v:27000,ni:2,ph:''},
    {id:'u7',pI:'p1',nm:'شقة 7',cn:'',tn:'علي الشمراني',us:'مستأجرة',ds:'2026-01-01',de:'2026-12-30',pm:'',v:27000,ni:0,ph:''},
  ],
  ins:[], ex:[
    {id:'e1',pI:'p1',un:'شقة 1',dt:'2026-02-10',tp:'صيانة',ds:'إصلاح تسريب مياه',am:1500,ps:'مسدد'},
    {id:'e2',pI:'p1',un:'شقة 1',dt:'2026-02-15',tp:'كهرباء',ds:'تركيب مكيف سبليت',am:3200,ps:'مسدد'},
    {id:'e3',pI:'p1',un:'شقة 3',dt:'2026-03-01',tp:'سباكة',ds:'صيانة حمام',am:800,ps:'مسدد'},
    {id:'e4',pI:'p1',un:'شقة 4',dt:'2026-03-05',tp:'دهانات',ds:'دهان صالة',am:2500,ps:'غير مسدد'},
    {id:'e5',pI:'p1',un:'شقة 6',dt:'2026-03-10',tp:'أجهزة',ds:'سخان مياه',am:1800,ps:'مسدد'},
    {id:'e6',pI:'p1',un:'شقة 2',dt:'2026-03-15',tp:'نظافة',ds:'تنظيف شامل',am:600,ps:'مسدد'},
  ],
  // Phase 2: Maintenance
  mt:[
    {id:'m1',pI:'p1',un:'شقة 1',tp:'سباكة',ds:'تسريب مياه في المطبخ',pr:'عاجل',st:'مكتمل',dt:'2026-02-08',dd:'2026-02-10',vnd:'مؤسسة الصيانة',cost:1500,nt:'تم الإصلاح'},
    {id:'m2',pI:'p1',un:'شقة 4',tp:'دهانات',ds:'دهان صالة الاستقبال',pr:'عادي',st:'قيد التنفيذ',dt:'2026-03-01',dd:'',vnd:'معلم الدهانات',cost:2500,nt:''},
    {id:'m3',pI:'p1',un:'شقة 6',tp:'كهرباء',ds:'صيانة مكيف سبليت',pr:'متوسط',st:'جديد',dt:'2026-03-18',dd:'',vnd:'',cost:0,nt:'المستأجر أبلغ عن ضعف التبريد'},
  ],
  // Phase 2: Audit Log
  log:[],
  // Nav
  vw:'home',aO:null,aP:null,aU:null,pt:'d',
  ml:null,fm:{},mp:null,eI:null,
  drt:false,lsv:'',
};

// Build initial installments
function buildIns(){
  const data=[
    {u:'u1',d:['2026-01-01'],a:22000,p:[[{d:'2026-01-15',a:22000,m:'منصة ايجار'}]]},
    {u:'u2',d:['2026-01-01','2026-04-01','2026-07-01','2026-10-01'],a:5500,p:[[{d:'2026-01-10',a:5500,m:'تحويل بنكي'}],[],[],[]]},
    {u:'u3',d:['2026-01-01','2026-04-01','2026-07-01','2026-10-01'],a:6500,p:[[{d:'2026-01-08',a:6500,m:'منصة ايجار'}],[],[],[]]},
    {u:'u4',d:['2026-01-01','2026-07-01'],a:13000,p:[[{d:'2026-01-05',a:13000,m:'تحويل بنكي'}],[{d:'2026-07-03',a:7000,m:'تحويل بنكي'}]]},
    {u:'u6',d:['2026-01-01','2026-07-01'],a:13500,p:[[{d:'2026-01-12',a:13500,m:'منصة ايجار'}],[]]},
  ];
  const r=[];
  data.forEach(x=>x.d.forEach((dt,i)=>r.push({id:ID(),uI:x.u,num:i+1,dd:dt,am:x.a,py:x.p[i]||[]})));
  return r;
}
state.ins = buildIns();

// ═══ Storage ═══
const SK='baho-pms-v3';
function saveLS(){
  try{
    const d={ow:state.ow,pr:state.pr,un:state.un,ins:state.ins,ex:state.ex,mt:state.mt,log:state.log,brk:state.brk,brkLinks:state.brkLinks,prj:state.prj,lsv:TS()};
    localStorage.setItem(SK,JSON.stringify(d));
    state.lsv=d.lsv;state.drt=false;
    return true;
  }catch(e){return false}
}
function loadLS(){
  try{
    const s=localStorage.getItem(SK);
    if(s){const d=JSON.parse(s);if(d.ow){
      state.ow=d.ow;state.pr=d.pr;state.un=d.un;state.ins=d.ins;state.ex=d.ex;
      state.mt=d.mt||[];state.log=d.log||[];state.brk=d.brk||[];state.brkLinks=d.brkLinks||[];state.prj=d.prj||[];state.lsv=d.lsv||'';return true;
    }}
  }catch(e){}return false;
}

// Auto-save
let autoSaveTimer=null;
function markDirty(){state.drt=true;clearTimeout(autoSaveTimer);autoSaveTimer=setTimeout(()=>{saveLS();render()},90000)}

// ═══ Audit Log (Phase 2) ═══
function addLog(action, entity, entityId, details){
  state.log.unshift({id:ID(),dt:TS(),action,entity,entityId,details});
  if(state.log.length>200) state.log=state.log.slice(0,200); // keep last 200
}

// ═══ Navigation ═══
function goH(){state.vw='home';state.aO=null;state.aP=null;state.aU=null;render()}
function goO(id){state.aO=id;state.aP=null;state.aU=null;state.vw='owner';render()}
function goP(id){const p=state.pr.find(x=>x.id===id);if(p?.oI)state.aO=p.oI;state.aP=id;state.aU=null;state.vw='prop';state.pt='d';render()}
function goU(id){const u=state.un.find(x=>x.id===id);if(u){const p=state.pr.find(x=>x.id===u.pI);if(p){state.aP=p.id;if(p.oI)state.aO=p.oI}}state.aU=id;state.vw='unit';state.eI=null;render()}

// ═══ Data Lookups ═══
const oPs=o=>state.pr.filter(p=>p.oI===o);
const pUs=p=>state.un.filter(u=>u.pI===p);
const uIns=u=>state.ins.filter(i=>i.uI===u).sort((a,b)=>a.num-b.num);
const uTP=u=>uIns(u).reduce((s,i)=>s+iP(i),0);
const pExs=p=>state.ex.filter(e=>e.pI===p);
const uExs=(p,n)=>state.ex.filter(e=>e.pI===p&&e.un===n);
const uExT=(p,n)=>uExs(p,n).reduce((s,e)=>s+e.am,0);
const pMts=p=>state.mt.filter(m=>m.pI===p);
const uMts=(p,n)=>state.mt.filter(m=>m.pI===p&&m.un===n);

function pSt(pId){
  const us=pUs(pId),es=pExs(pId),mts=pMts(pId);
  const tv=us.reduce((s,u)=>s+u.v,0),tp=us.reduce((s,u)=>s+uTP(u.id),0),te=es.reduce((s,e)=>s+e.am,0);
  const aI=us.flatMap(u=>uIns(u.id)),fi=aI.filter(iF).length;
  return{n:us.length,tv,tp,rm:tv-tp,rt:tv?tp/tv:0,te,nt:tp-te,
    rn:us.filter(u=>u.us==='مستأجرة').length,vc:us.filter(u=>u.us==='شاغرة').length,
    fi,ti:aI.length,od:aI.filter(i=>!iF(i)&&new Date(i.dd)<new Date()).length,
    mtn:mts.filter(m=>m.st==='جديد').length,mtp:mts.filter(m=>m.st==='قيد التنفيذ').length,
    mtd:mts.filter(m=>m.st==='مكتمل').length,mtc:mts.length,
    pe:es.filter(e=>e.ps==='مسدد').reduce((s,e)=>s+e.am,0),
    ue:es.filter(e=>e.ps!=='مسدد').reduce((s,e)=>s+e.am,0),ec:es.length};
}
function oSt(o){const ps=oPs(o);let tv=0,tp=0,te=0,n=0,rn=0,vc=0;
  ps.forEach(p=>{const s=pSt(p.id);tv+=s.tv;tp+=s.tp;te+=s.te;n+=s.n;rn+=s.rn;vc+=s.vc});
  return{pc:ps.length,n,tv,tp,rm:tv-tp,rt:tv?tp/tv:0,te,nt:tp-te,rn,vc}}
function gS(){
  const tv=state.un.reduce((s,u)=>s+u.v,0),tp=state.un.reduce((s,u)=>s+uTP(u.id),0),te=state.ex.reduce((s,e)=>s+e.am,0);
  return{oc:state.ow.length,pc:state.pr.length,uc:state.un.length,tv,tp,rm:tv-tp,rt:tv?tp/tv:0,te,nt:tp-te,
    rn:state.un.filter(u=>u.us==='مستأجرة').length,vc:state.un.filter(u=>u.us==='شاغرة').length,
    mtn:state.mt.filter(m=>m.st==='جديد').length,mtp:state.mt.filter(m=>m.st==='قيد التنفيذ').length}}
function getAlerts(){
  const r=[];state.un.forEach(u=>{const p=state.pr.find(x=>x.id===u.pI);
    uIns(u.id).filter(i=>!iF(i)).forEach(i=>{const o=new Date(i.dd)<new Date(),d=o?Math.round((new Date()-new Date(i.dd))/864e5):Math.round((new Date(i.dd)-new Date())/864e5);
    r.push({...i,tn:u.tn,unm:u.nm,ph:u.ph,pnm:p?.nm||'',pI:u.pI,uId:u.id,o,d,rm2:iR(i),pd2:iP(i)})})});
  // Contract expiry alerts
  state.un.forEach(u=>{if(u.de){const days=DL(u.de);if(days<=30&&days>0){const p=state.pr.find(x=>x.id===u.pI);
    r.push({id:'cx-'+u.id,type:'contract',unm:u.nm,tn:u.tn,pnm:p?.nm||'',days,de:u.de})}}});
  return r.sort((a,b)=>{if(a.type==='contract')return 1;if(b.type==='contract')return -1;return new Date(a.dd||'9999')-new Date(b.dd||'9999')});
}

  if(t==='p'){if(eId){const idx=state.pr.findIndex(x=>x.id===eId);if(idx>=0){addLog('تعديل','عقار',eId,`تعديل: ${d.nm}`);state.pr[idx]={...d,id:eId}}}else{const nid=ID();state.pr.push({...d,id:nid});addLog('إضافة','عقار',nid,`عقار جديد: ${d.nm}`)}}
  if(t==='u'){if(eId){const idx=state.un.findIndex(x=>x.id===eId);if(idx>=0){addLog('تعديل','وحدة',eId,`تعديل: ${d.nm}`);state.un[idx]={...d,id:eId}}}else{const nid=ID();state.un.push({...d,id:nid});gDD(d.ds,d.ni).forEach((dt,i)=>state.ins.push({id:ID(),uI:nid,num:i+1,dd:dt,am:d.ni>0?Math.round(d.v/d.ni):0,py:[]}));addLog('إضافة','وحدة',nid,`وحدة جديدة: ${d.nm}`)}}
  if(t==='e'){if(eId){const idx=state.ex.findIndex(x=>x.id===eId);if(idx>=0){state.ex[idx]={...d,id:eId};addLog('تعديل','مصروف',eId,d.ds)}}else{const nid=ID();state.ex.push({...d,id:nid});addLog('إضافة','مصروف',nid,`${d.tp}: ${d.ds}`)}}
  if(t==='mt'){if(eId){const idx=state.mt.findIndex(x=>x.id===eId);if(idx>=0){state.mt[idx]={...d,id:eId};addLog('تعديل','صيانة',eId,d.ds)}}else{const nid=ID();state.mt.push({...d,id:nid});addLog('إضافة','صيانة',nid,`${d.tp}: ${d.ds}`)}}
  if(t==='brk'){if(eId){const idx=state.brk.findIndex(x=>x.id===eId);if(idx>=0){state.brk[idx]={...d,id:eId};addLog('تعديل','وسيط',eId,d.nm)}}else{const nid=ID();state.brk.push({...d,id:nid});addLog('إضافة','وسيط',nid,d.nm)}}
  if(t==='bl'){if(eId){const idx=state.brkLinks.findIndex(x=>x.id===eId);if(idx>=0){state.brkLinks[idx]={...d,id:eId}}}else{state.brkLinks.push({...d,id:ID()});addLog('إضافة','عمولة وسيط',d.brkId,`${R(d.commAmt)}`)}}
  if(t==='prj'){if(eId){const idx=state.prj.findIndex(x=>x.id===eId);if(idx>=0){state.prj[idx]={...d,id:eId};addLog('تعديل','مشروع',eId,d.nm)}}else{const nid=ID();state.prj.push({...d,id:nid,phases:d.phases||[]});addLog('إضافة','مشروع',nid,d.nm)}}
  state.ml=null;markDirty();render();
}
function dlEntity(t,id){
  if(t==='o'){const pids=state.pr.filter(p=>p.oI===id).map(p=>p.id);const uids=state.un.filter(u=>pids.includes(u.pI)).map(u=>u.id);addLog('حذف','مالك',id,state.ow.find(x=>x.id===id)?.nm);state.ow=state.ow.filter(x=>x.id!==id);state.pr=state.pr.filter(x=>x.oI!==id);state.un=state.un.filter(x=>!pids.includes(x.pI));state.ins=state.ins.filter(x=>!uids.includes(x.uI));state.ex=state.ex.filter(x=>!pids.includes(x.pI));state.mt=state.mt.filter(x=>!pids.includes(x.pI));if(state.aO===id)goH();else{markDirty();render()}}
  if(t==='p'){const uids=state.un.filter(u=>u.pI===id).map(u=>u.id);addLog('حذف','عقار',id,state.pr.find(x=>x.id===id)?.nm);state.pr=state.pr.filter(x=>x.id!==id);state.un=state.un.filter(x=>x.pI!==id);state.ins=state.ins.filter(x=>!uids.includes(x.uI));state.ex=state.ex.filter(x=>x.pI!==id);state.mt=state.mt.filter(x=>x.pI!==id);if(state.aP===id){state.aO?goO(state.aO):goH()}else{markDirty();render()}}
  if(t==='u'){addLog('حذف','وحدة',id,state.un.find(x=>x.id===id)?.nm);state.ins=state.ins.filter(x=>x.uI!==id);state.un=state.un.filter(x=>x.id!==id);if(state.aU===id){state.vw='prop';state.aU=null}markDirty();render()}
  if(t==='e'){addLog('حذف','مصروف',id,'');state.ex=state.ex.filter(x=>x.id!==id);markDirty();render()}
  if(t==='mt'){addLog('حذف','صيانة',id,'');state.mt=state.mt.filter(x=>x.id!==id);markDirty();render()}
  if(t==='brk'){state.brkLinks=state.brkLinks.filter(x=>x.brkId!==id);addLog('حذف','وسيط',id,'');state.brk=state.brk.filter(x=>x.id!==id);markDirty();render()}
  if(t==='bl'){state.brkLinks=state.brkLinks.filter(x=>x.id!==id);markDirty();render()}
  if(t==='prj'){addLog('حذف','مشروع',id,'');state.prj=state.prj.filter(x=>x.id!==id);markDirty();render()}
}

// Payment operations
function addPay(instId,d){
  const i=state.ins.find(x=>x.id===instId);if(!i)return;
  const rm=iR(i),a=Math.min(Number(d.amount)||0,rm);if(a<=0)return;
  if(!i.py)i.py=[];i.py.push({d:d.date||TD(),a,m:d.method||'',n:d.notes||''});
  addLog('دفعة','دفعة',instId,`${R(a)}`);
  state.ml=null;markDirty();render();
}
function rmPay(instId,idx){const i=state.ins.find(x=>x.id===instId);if(i?.py){i.py.splice(idx,1);addLog('حذف دفعة','دفعة',instId,'');markDirty();render()}}
function payAll(instId){const i=state.ins.find(x=>x.id===instId);if(i){const rm=iR(i);if(rm>0){if(!i.py)i.py=[];i.py.push({d:TD(),a:rm,m:''});addLog('إكمال دفعة','دفعة',instId,R(rm));markDirty();render()}}}
function edtAmt(instId,a){const i=state.ins.find(x=>x.id===instId);if(i){i.am=Number(a)||0;state.ml=null;markDirty();render()}}
function addInst(uId,d){const e=uIns(uId);state.ins.push({id:ID(),uI:uId,num:e.length>0?Math.max(...e.map(x=>x.num))+1:1,dd:d.dueDate,am:Number(d.amount),py:[]});state.ml=null;markDirty();render()}
function delIns(id){state.ins=state.ins.filter(i=>i.id!==id);markDirty();render()}

// Export/Import
function expJSON(){
  const b=new Blob([JSON.stringify({ow:state.ow,pr:state.pr,un:state.un,ins:state.ins,ex:state.ex,mt:state.mt,log:state.log,brk:state.brk,brkLinks:state.brkLinks,prj:state.prj,dt:new Date().toISOString(),v:4},null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=`عقارات_${TD()}.json`;a.click()}
function impJSON(e){
  const f=e.target.files?.[0];if(!f)return;
  const rd=new FileReader();rd.onload=ev=>{try{const d=JSON.parse(ev.target.result);
    if(d.ow&&d.pr){if(confirm('سيتم استبدال جميع البيانات. متأكد؟')){
      state.ow=d.ow;state.pr=d.pr;state.un=d.un||[];state.ins=d.ins||[];state.ex=d.ex||[];state.mt=d.mt||[];state.log=d.log||[];state.brk=d.brk||[];state.brkLinks=d.brkLinks||[];state.prj=d.prj||[];
      saveLS();render();alert('✓ تم الاستيراد بنجاح')}}
  }catch{alert('ملف غير صالح')}};rd.readAsText(f);e.target.value=''}

  {id:'pj1',nm:'مشروع بناء فيلا الروضة',loc:'حي الروضة — المدينة المنورة',st:'تنفيذ',budget:1500000,spent:850000,

   phases:[{nm:'شراء الأرض',st:'مكتمل',cost:500000},{nm:'التصميم',st:'مكتمل',cost:50000},{nm:'الرخص',st:'مكتمل',cost:15000},{nm:'البناء',st:'قيد التنفيذ',cost:285000},{nm:'التشطيب',st:'لم يبدأ',cost:0}]}

function brkStats(bId){
  const links=state.brkLinks.filter(l=>l.brkId===bId);
  const totalComm=links.reduce((s,l)=>s+(l.commAmt||0),0);
  const paidComm=links.filter(l=>l.commPaid).reduce((s,l)=>s+(l.commAmt||0),0);
  return{deals:links.length,totalComm,paidComm,unpaidComm:totalComm-paidComm,links};
}

function prjStats(pj){
  const spent=pj.phases?pj.phases.reduce((s,p)=>s+(p.cost||0),0):(pj.spent||0);
  const completedPhases=pj.phases?pj.phases.filter(p=>p.st==='مكتمل').length:0;
  const totalPhases=pj.phases?pj.phases.length:0;
  const progress=totalPhases>0?completedPhases/totalPhases:0;
  return{spent,remaining:(pj.budget||0)-spent,completedPhases,totalPhases,progress};
}

function calcKPIs(pId){
  const s=pSt(pId),us=pUs(pId),es=pExs(pId);
  const occRate=s.n>0?s.rn/s.n:0; // Occupancy rate
  const roi=s.tv>0?(s.nt/s.tv):0; // ROI
  const avgRent=s.n>0?s.tv/s.n:0; // Average rent per unit
  const revenuePerUnit=s.n>0?s.tp/s.n:0; // Revenue per unit
  const expenseRatio=s.tp>0?s.te/s.tp:0; // Expense ratio
  const collectionEff=s.tv>0?s.tp/s.tv:0; // Collection efficiency
  const mtCost=pMts(pId).reduce((a,m)=>a+m.cost,0);
  const vacantUnits=us.filter(u=>u.us==='شاغرة');
  const vacantDays=vacantUnits.reduce((a,u)=>{const d=u.ds?Math.round((new Date()-new Date(u.ds))/864e5):0;return a+Math.max(0,d)},0);
  const overdueAmt=uIns(pId).length>0?0:0;
  let odAmt=0;us.forEach(u=>{uIns(u.id).filter(i=>!iF(i)&&new Date(i.dd)<new Date()).forEach(i=>{odAmt+=iR(i)})});
  return{occRate,roi,avgRent,revenuePerUnit,expenseRatio,collectionEff,mtCost,vacantDays,odAmt,...s};
}

function benchmarkAll(){
  return state.pr.map(p=>{const k=calcKPIs(p.id);const o=state.ow.find(x=>x.id===p.oI);
    return{id:p.id,nm:p.nm,owner:o?.nm||'مستقل',loc:p.loc,tp:p.tp,...k}})
    .sort((a,b)=>b.nt-a.nt); // Sort by net income
}

function forecast(pId,months=6){
  const us=pUs(pId),es=pExs(pId);
  const monthlyRent=us.reduce((s,u)=>s+u.v,0)/12;
  const s=pSt(pId);
  const monthlyExpAvg=es.length>0?s.te/Math.max(1,new Set(es.map(e=>e.dt?.slice(0,7))).size):0;
  const collRate=s.rt||0;
  const rows=[];
  for(let i=1;i<=months;i++){
    const d=new Date();d.setMonth(d.getMonth()+i);
    const mo=d.toLocaleDateString('ar-SA',{year:'numeric',month:'short'});
    const rev=monthlyRent*collRate;
    const exp=monthlyExpAvg;
    const net=rev-exp;
    const cumRev=(rows.length>0?rows[rows.length-1].cumRev:s.tp)+rev;
    const cumExp=(rows.length>0?rows[rows.length-1].cumExp:s.te)+exp;
    rows.push({mo,rev,exp,net,cumRev,cumExp,cumNet:cumRev-cumExp});
  }
  return{monthlyRent,monthlyExpAvg,collRate,rows};
}

function costCenter(pId){
  const us=pUs(pId),es=pExs(pId),mts=pMts(pId);
  // Revenue by unit
  const byUnit=us.map(u=>{
    const pd=uTP(u.id),exp=uExT(pId,u.nm);
    const mtC=mts.filter(m=>m.un===u.nm).reduce((s,m)=>s+m.cost,0);
    return{nm:u.nm,tn:u.tn,us:u.us,rent:u.v,paid:pd,rem:u.v-pd,exp,mtC,totalExp:exp+mtC,net:pd-exp-mtC};
  });
  // Expense by type
  const byType={};es.forEach(e=>{byType[e.tp]=(byType[e.tp]||0)+e.am});
  // Maintenance by type
  const mtByType={};mts.forEach(m=>{if(m.cost>0)mtByType[m.tp]=(mtByType[m.tp]||0)+m.cost});
  return{byUnit,byType,mtByType};
}
